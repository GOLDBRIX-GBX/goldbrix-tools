let currentLang = localStorage.getItem('gbx_lang') || 'en';

function renderLang(lang) {
  currentLang = lang;
  const t = T[lang];

  // Set HTML dir + lang
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

  // Hero protocol label
  document.getElementById('protocolLabel').textContent = t.protocol;

  // Content sections
  const html = t.sections.map(s => {
    const titleClass = s.color === 'red' ? 'v3-card__title v3-card__title--red' : 'v3-card__title';
    const cardClass = s.color === 'red' ? 'v3-card v3-card--warning' : 'v3-card';
    return '<div class="' + cardClass + ' v3-slide-up">' +
           '<div class="' + titleClass + '">' + s.icon + ' ' + s.title + '</div>' +
           '<div class="v3-card__body">' + s.body + '</div>' +
           '</div>';
  }).join('');
  document.getElementById('content').innerHTML = html;

  // Checkboxes
  document.getElementById('chk1Label').textContent = t.chk1;
  document.getElementById('chk2Label').textContent = t.chk2;
  document.getElementById('chk3Label').textContent = t.chk3;
  document.getElementById('acceptLabel').textContent = t.accept;

  // Active pill
  document.querySelectorAll('.lang-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.lang === lang);
  });

  // Save
  localStorage.setItem('gbx_lang', lang);
}

function updateBtn() {
  const c1 = document.getElementById('chk1').checked;
  const c2 = document.getElementById('chk2').checked;
  const c3 = document.getElementById('chk3').checked;
  document.getElementById('acceptBtn').disabled = !(c1 && c2 && c3);
}

function accept() {
  localStorage.setItem('gbx_disclaimer_agreed', 'true');
  localStorage.setItem('gbx_disclaimer_agreed_at', String(Date.now()));
  localStorage.setItem('gbx_lang', currentLang);
  window.location.href = '/v3/welcome.html';
}

// Init
document.querySelectorAll('.lang-pill').forEach(p => {
  p.addEventListener('click', () => renderLang(p.dataset.lang));
});

renderLang(currentLang);

// ═══ PWA Install Detection ═══
let deferredPrompt = null;

// Translations for PWA banner
const PWA_T = {
  en: { title: 'Install GoldBrix App', sub: 'Faster · Offline · Native feel', install: 'INSTALL' },
  ro: { title: 'Instalează GoldBrix App', sub: 'Mai rapid · Offline · Aplicație nativă', install: 'INSTALEAZĂ' },
  de: { title: 'GoldBrix App installieren', sub: 'Schneller · Offline · Native', install: 'INSTALLIEREN' },
  zh: { title: '安装 GoldBrix 应用', sub: '更快 · 离线 · 原生体验', install: '安装' },
  ar: { title: 'تثبيت تطبيق GoldBrix', sub: 'أسرع · بدون اتصال · أصلي', install: 'تثبيت' }
};

function updatePwaBannerLang(lang) {
  const t = PWA_T[lang] || PWA_T.en;
  const title = document.getElementById('pwaBannerTitle');
  const sub = document.getElementById('pwaBannerSub');
  const btn = document.getElementById('pwaInstallBtn');
  if (title) title.textContent = t.title;
  if (sub) sub.textContent = t.sub;
  if (btn) btn.textContent = t.install;
}

function isPwaInstalled() {
  // 1) Display mode is standalone (already installed)
  if (window.matchMedia('(display-mode: standalone)').matches) return true;
  // 2) iOS Safari standalone flag
  if (window.navigator.standalone === true) return true;
  // 3) User dismissed recently (< 7 days)
  const dismissed = parseInt(localStorage.getItem('gbx_pwa_dismissed_at') || '0');
  if (dismissed && (Date.now() - dismissed) < 7 * 24 * 60 * 60 * 1000) return true;
  return false;
}

function showPwaBanner() {
  if (isPwaInstalled()) return;
  const banner = document.getElementById('pwaBanner');
  if (banner) {
    banner.classList.add('show');
    updatePwaBannerLang(currentLang);
  }
}

function pwaDismiss() {
  const banner = document.getElementById('pwaBanner');
  if (banner) banner.classList.remove('show');
  localStorage.setItem('gbx_pwa_dismissed_at', String(Date.now()));
}

async function pwaInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const choice = await deferredPrompt.userChoice;
    if (choice.outcome === 'accepted') {
      localStorage.setItem('gbx_pwa_installed', 'true');
      const banner = document.getElementById('pwaBanner');
      if (banner) banner.classList.remove('show');
    }
    deferredPrompt = null;
  } else {
    // iOS / fallback: show instructions
    const ua = navigator.userAgent.toLowerCase();
    if (/iphone|ipad|ipod/.test(ua)) {
      alert('iOS: Tap Share → Add to Home Screen');
    } else {
      alert('Open menu → Install / Add to Home Screen');
    }
  }
}

// Listen for beforeinstallprompt (Chrome/Edge/Android)
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  showPwaBanner();
});

// Listen for app installed
window.addEventListener('appinstalled', () => {
  localStorage.setItem('gbx_pwa_installed', 'true');
  const banner = document.getElementById('pwaBanner');
  if (banner) banner.classList.remove('show');
});

// Check on load (for iOS or after timeout)
setTimeout(() => {
  if (!isPwaInstalled() && !deferredPrompt) {
    // Show banner anyway for iOS users (no beforeinstallprompt event there)
    const ua = navigator.userAgent.toLowerCase();
    if (/iphone|ipad|ipod/.test(ua) || /android/.test(ua)) {
      showPwaBanner();
    }
  } else if (deferredPrompt) {
    showPwaBanner();
  }
}, 1500);

// Update PWA banner when language changes
const origRenderLang = renderLang;
renderLang = function(lang) {
  origRenderLang(lang);
  updatePwaBannerLang(lang);
};
