<style>#burnTicker,#liveTicker,.burn-ticker,.live-ticker{display:none !important;}</style>

<body>
<div class="v3-app">

  <!-- PWA BANNER -->
  <div class="v3-pwa-banner" id="pwaBanner">
    <div class="v3-pwa-banner__icon">
      <img src="/assets/coin/gbx-coin-32.png" alt="">
    </div>
    <div class="v3-pwa-banner__text">
      <div class="v3-pwa-banner__title" id="pwaBannerTitle">Install GoldBrix App</div>
      <div class="v3-pwa-banner__sub" id="pwaBannerSub">Faster · Offline · Native feel</div>
    </div>
    <button class="v3-pwa-banner__install" id="pwaInstallBtn" onclick="pwaInstall()">INSTALL</button>
    <button class="v3-pwa-banner__close" onclick="pwaDismiss()">×</button>
  </div>

  <div class="v3-container v3-fade-in">

    <a class="back-btn" href="javascript:history.back()" data-t="back">← Back</a>

    <div class="lang-header">
      <div class="lang-header__title">SELECT LANGUAGE</div>
      <div class="lang-header__sub">LIMBĂ · SPRACHE · 语言 · لغة</div>
    </div>

    <div class="lang-list v3-slide-up">

      <div class="v3-lang-row" onclick="pickLang('en')">
        <span class="v3-lang-row__flag">🇬🇧</span>
        <div class="v3-lang-row__info">
          <div class="v3-lang-row__name">English</div>
          <div class="v3-lang-row__code">EN</div>
        </div>
        <span class="v3-lang-row__arrow">→</span>
      </div>

      <div class="v3-lang-row" onclick="pickLang('ro')">
        <span class="v3-lang-row__flag">🇷🇴</span>
        <div class="v3-lang-row__info">
          <div class="v3-lang-row__name">Română</div>
          <div class="v3-lang-row__code">RO</div>
        </div>
        <span class="v3-lang-row__arrow">→</span>
      </div>

      <div class="v3-lang-row" onclick="pickLang('de')">
        <span class="v3-lang-row__flag">🇩🇪</span>
        <div class="v3-lang-row__info">
          <div class="v3-lang-row__name">Deutsch</div>
          <div class="v3-lang-row__code">DE</div>
        </div>
        <span class="v3-lang-row__arrow">→</span>
      </div>

      <div class="v3-lang-row" onclick="pickLang('zh')">
        <span class="v3-lang-row__flag">🇨🇳</span>
        <div class="v3-lang-row__info">
          <div class="v3-lang-row__name">中文</div>
          <div class="v3-lang-row__code">ZH</div>
        </div>
        <span class="v3-lang-row__arrow">→</span>
      </div>

      <div class="v3-lang-row" onclick="pickLang('ar')">
        <span class="v3-lang-row__flag">🇸🇦</span>
        <div class="v3-lang-row__info">
          <div class="v3-lang-row__name">العربية</div>
          <div class="v3-lang-row__code">AR</div>
        </div>
        <span class="v3-lang-row__arrow">→</span>
      </div>

    </div>

    <div class="v3-footer">
      v3.0 · PHASE 1.5 LIVE · NO TEAM · NO ADMIN
    </div>

  </div>
</div>

<script>
const PWA_T = {
  en: { title: 'Install GoldBrix App', sub: 'Faster · Offline · Native feel', install: 'INSTALL' },
  ro: { title: 'Instalează GoldBrix App', sub: 'Mai rapid · Offline · Aplicație nativă', install: 'INSTALEAZĂ' },
  de: { title: 'GoldBrix App installieren', sub: 'Schneller · Offline · Native', install: 'INSTALLIEREN' },
  zh: { title: '安装 GoldBrix 应用', sub: '更快 · 离线 · 原生体验', install: '安装' },
  ar: { title: 'تثبيت تطبيق GoldBrix', sub: 'أسرع · بدون اتصال · أصلي', install: 'تثبيت' }
};

function pickLang(lang) {
  localStorage.setItem('gbx_lang', lang);
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  // Redirect back to where user came from (or welcome by default)
  const ref = document.referrer;
  if (ref && ref.includes('/v3/') && !ref.includes('language.html')) {
    window.location.href = ref;
  } else {
    window.location.href = '/v3/welcome.html';
  }
}

// PWA
let deferredPrompt = null;
function isPwaInstalled() {
  if (window.matchMedia('(display-mode: standalone)').matches) return true;
  if (window.navigator.standalone === true) return true;
  const d = parseInt(localStorage.getItem('gbx_pwa_dismissed_at') || '0');
  if (d && (Date.now() - d) < 7*24*60*60*1000) return true;
  return false;
}
function showPwaBanner() {
  if (isPwaInstalled()) return;
  const lang = localStorage.getItem('gbx_lang') || 'en';
  const t = PWA_T[lang] || PWA_T.en;
  document.getElementById('pwaBannerTitle').textContent = t.title;
  document.getElementById('pwaBannerSub').textContent = t.sub;
  document.getElementById('pwaInstallBtn').textContent = t.install;
  document.getElementById('pwaBanner').classList.add('show');
}
function pwaDismiss() {
  document.getElementById('pwaBanner').classList.remove('show');
  localStorage.setItem('gbx_pwa_dismissed_at', String(Date.now()));
}
async function pwaInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const c = await deferredPrompt.userChoice;
    if (c.outcome === 'accepted') document.getElementById('pwaBanner').classList.remove('show');
    deferredPrompt = null;
  } else {
    const ua = navigator.userAgent.toLowerCase();
    if (/iphone|ipad|ipod/.test(ua)) alert('iOS: Share → Add to Home Screen');
    else alert('Open menu → Install / Add to Home Screen');
  }
}
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; showPwaBanner(); });
setTimeout(() => {
  if (!isPwaInstalled()) {
    const ua = navigator.userAgent.toLowerCase();
    if (deferredPrompt || /iphone|ipad|ipod|android/.test(ua)) showPwaBanner();
  }
}, 1500);

// RTL on load if AR was already set
const savedLang = localStorage.getItem('gbx_lang');
if (savedLang === 'ar') document.documentElement.dir = 'rtl';
</script>
<script src="/v3/pwa.js?v=103" defer></script>



</body>
