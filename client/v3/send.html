function checkLock() {
  try{ if(window.GBXSession){ var _w=GBXSession.activeWallet(); if(_w){ activeWallet=_w; return true; } } }catch(e){}
  const unlockedRaw = sessionStorage.getItem('gbx_unlocked_wallets');
  if (!unlockedRaw) { window.location.href = '/v3/unlock.html'; return false; }
  try {
    const u = JSON.parse(unlockedRaw);
    if (!u.unlocked_at || (Date.now() - u.unlocked_at) > 30*60*1000) {
      sessionStorage.removeItem('gbx_unlocked_wallets');
      window.location.href = '/v3/unlock.html'; return false;
    }
    const w = u.wallets.find(x => x.id === u.activeWalletId) || u.wallets[0];
    if (!w || !w.mnemonic || !w.address) { window.location.href = '/v3/unlock.html'; return false; }
    activeWallet = w;
    return true;
  } catch(e) { window.location.href = '/v3/unlock.html'; return false; }
}

function onTokenChange() {
  const sel = document.getElementById('tokenSelect');
  const [type, ticker, balanceStr, extra] = sel.value.split('|');
  if (type === 'EVM') {
    const a = EVM_ASSETS.find(x => x.ticker === ticker && x.chain === extra) || { dec: ticker==='ETH'?18:6, kind: ticker==='ETH'?'native':'token' };
    selectedToken = { type:'EVM', ticker, balance: Number(balanceStr)||0, chain: extra, dec: a.dec, kind: a.kind };
  } else if (type === 'SOL') {
    selectedToken = { type:'SOL', ticker, balance: Number(balanceStr)||0, dec: Number(extra)||9 };
  } else if (type === 'NATIVE') {
    selectedToken = { type:'NATIVE', ticker, balance: Number(balanceStr)||0, coin_id: extra==='null'?null:extra };
  } else {
    selectedToken = { type:'GBX', ticker:'GBX', balance: Number(balanceStr)||0, coin_id:null };
  }
  availableBalance = selectedToken.balance;
  const maxFrac = (selectedToken.type==='EVM' && selectedToken.kind==='native') ? 6 : 4;
  document.getElementById('balanceVal').textContent = availableBalance.toLocaleString('en-US', {maximumFractionDigits: maxFrac});
  document.getElementById('balanceTicker').textContent = selectedToken.ticker;
  if (selectedToken.type === 'EVM') {
    var _nat = (selectedToken.chain==='bsc') ? 'BNB' : 'ETH';
    document.getElementById('netFee').textContent = '~gas ' + _nat;
  } else if (selectedToken.type === 'SOL') {
    document.getElementById('netFee').textContent = (selectedToken.ticker==='SOL') ? '~0.00001 SOL' : '~0.00001 SOL (+~0.002 SOL rent la destinatar nou)';
  } else document.getElementById('netFee').textContent = '~' + GBX_NET_FEE.toFixed(4) + ' GBX';
  updateTotal();
}

function setMax() {
  var b = Number(selectedToken.balance) || 0;
  if (selectedToken.type === 'SOL' && selectedToken.ticker === 'SOL') b = Math.max(0, b - 0.00095); // fee + rent-exempt minim Solana
  else if (selectedToken.type === 'EVM' && selectedToken.kind === 'native') b = Math.max(0, b * 0.98); // lasa gas
  document.getElementById('amount').value = (selectedToken.type==='GBX') ? Math.max(0, b - GBX_NET_FEE) : b;
  updateTotal();
}


function updateTotal() {
  const amt = Number(document.getElementById('amount').value) || 0;
  if (selectedToken.type === 'GBX') {
    document.getElementById('totalVal').textContent = (amt + GBX_NET_FEE).toFixed(4) + ' GBX';
  } else if (selectedToken.type === 'EVM') {
    const dp = selectedToken.kind==='native' ? 6 : 2;
    document.getElementById('totalVal').textContent = amt.toLocaleString('en-US', {maximumFractionDigits: dp}) + ' ' + selectedToken.ticker + ' + gas ETH';
  } else if (selectedToken.type === 'SOL') {
    document.getElementById('totalVal').textContent = amt.toLocaleString('en-US', {maximumFractionDigits: selectedToken.ticker==='SOL'?6:2}) + ' ' + selectedToken.ticker + ' + gas SOL';
  } else {
    document.getElementById('totalVal').textContent = amt.toLocaleString('en-US', {maximumFractionDigits: 4}) + ' ' + selectedToken.ticker + ' + ' + GBX_NET_FEE.toFixed(4) + ' GBX fee';
  }
}

async function waitForCrypto(maxMs=8000) {
  const s = Date.now();
  while (!window.GoldbrixCrypto) {
    if (Date.now()-s > maxMs) throw new Error('crypto timeout');
    await new Promise(r => setTimeout(r, 100));
  }
}

// Anti-double-send
let _lastSendAt=0, _lastSendKey=null;


async function doSend() {
  const to = document.getElementById('toAddr').value.trim();
  const amt = Number(String(document.getElementById('amount').value).replace(',', '.'));
  
  // Anti-double-send protection
  const _now=Date.now();
  const _key=to+'|'+amt;
  if(_lastSendKey===_key && (_now-_lastSendAt)<30000){
    const _r=Math.ceil((30000-(_now-_lastSendAt))/1000);
    showError(t('antiDup').replace('{sec}',_r));
    return;
  }

  if (selectedToken.type === 'EVM') {
    if (!to || !/^0x[0-9a-fA-F]{40}$/.test(to)) { showError(t('errInvalidAddr')); return; }
  } else if (selectedToken.type === 'SOL') {
    if (!to || !/^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(to)) { showError(t('errInvalidAddr')); return; }
  } else {
    if (!to || !to.startsWith('bn1q') || to.length < 40) { showError(t('errInvalidAddr')); return; }
  }
  if (!amt || amt <= 0 || isNaN(amt)) { showError(t('errAmount')); return; }
  if (to === activeWallet.address) { showError(t('errSelfSend')); return; }
  if (!activeWallet.mnemonic) { showError(t('noMnemonic')); return; }

  if (selectedToken.type === 'GBX') {
    if (amt + GBX_NET_FEE > availableBalance) { showError(t('errInsufficient')); return; }
  } else {
    if (amt > availableBalance) { showError(t('errInsufficient')); return; }
  }

  const confirmMsg = t('confirmSend')
    .replace('{amt}', amt.toLocaleString('en-US', {maximumFractionDigits: 4}))
    .replace('{tk}', selectedToken.ticker)
    .replace('{addr}', to);
  if (!(await gbxConfirm(confirmMsg))) return;
  window.gbxHaptic&&gbxHaptic('medium');
  _lastSendAt=_now; _lastSendKey=_key;
  const _btn=document.querySelector('button[onclick="doSend()"]');
  if(_btn){_btn.disabled=true;_btn.style.opacity='0.5';}
  setTimeout(()=>{if(_btn){_btn.disabled=false;_btn.style.opacity='1';}},30000);

  showStep('step-pending');

  try {
    let txHash = null;

    if (selectedToken.type === 'GBX') {
      // === GBX chain transfer ===
      const result = await window.GoldbrixCrypto.sendGBX(
        activeWallet.mnemonic, activeWallet.address, to, amt
      );
      txHash = (result && (result.txid || result.tx_hash || result.hash)) || 'broadcasted';
    } else if (selectedToken.type === 'EVM') {
      // === EVM transfer (USDC / ETH) — non-custodial, semnat LOCAL ===
      const cc = EVM_CHAINS[selectedToken.chain];
      const d = await window.GoldbrixMultichain.deriveEVM(activeWallet.mnemonic);
      const rpc = window.GoldbrixEVMSend.makeRPC(cc.rpc);
      const es = window.GoldbrixEVMSend.makeEVMSend({ rpc, evm:window.GoldbrixEVM, chainId:cc.chainId });
      const units = toUnits(amt, selectedToken.dec);
      const res = (selectedToken.kind === 'native')
        ? await es.sendNative(d.privateKey, to, units)
        : await es.sendToken(d.privateKey, cc.usdc, to, units);
      txHash = (res && res.hash) || 'broadcasted';
    } else if (selectedToken.type === 'SOL') {
      // === SOLANA transfer (SOL / USDC-SPL) — non-custodial, semnat LOCAL ===
      if (!window.__gbxSolSend) window.__gbxSolSend = await import('/v3/sol-send.mjs?v=103');
      await getSolAddr();
      const res = (selectedToken.ticker === 'SOL')
        ? await window.__gbxSolSend.sendSOL(_solSecretCache, to, amt)
        : await window.__gbxSolSend.sendUSDC(_solSecretCache, to, amt);
      txHash = (res && res.hash) || 'broadcasted';
    } else if (selectedToken.type === 'NATIVE') {
      // === NATIVE MEMECOIN XFER on-chain ===
      const r = await fetch('https://goldbrix.app/launchpad/native/transfer', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          coin_id: selectedToken.coin_id,
          sender_address: activeWallet.address,
          recipient_address: to,
          tokens_amount: amt
        })
      });
      const d = await r.json();
      if (!d.ok) {
        const errMsg = d.error || 'unknown';
        const balInfo = d.your_balance !== undefined ? ' (have ' + d.your_balance + ')' : '';
        throw new Error(errMsg + balInfo);
      }
      txHash = d.tx_hash || 'pending';
    }

    document.getElementById('successAmt').textContent = amt.toLocaleString('en-US', {maximumFractionDigits: 4}) + ' ' + selectedToken.ticker;
    document.getElementById('txHash').textContent = 'TX: ' + txHash;
    showStep('step-success'); window.gbxHaptic&&gbxHaptic('success'); abMaybeOfferSave(to);
    
    // Save sent TX to localStorage for wallet TX history
    try {
      const sh = JSON.parse(localStorage.getItem('goldbrix_sent_history') || '{}');
      if (!sh[activeWallet.address]) sh[activeWallet.address] = [];
      sh[activeWallet.address].unshift({
        txid: txHash, to: to, amount: amt,
        ticker: selectedToken.ticker, type: selectedToken.type,
        coin_id: selectedToken.coin_id || null, timestamp: Date.now()
      });
      sh[activeWallet.address] = sh[activeWallet.address].slice(0, 50);
      localStorage.setItem('goldbrix_sent_history', JSON.stringify(sh));
    } catch(e) { console.warn('[sent-history]', e); }
      setTimeout(()=>{document.getElementById('toAddr').value='';document.getElementById('amount').value='';},1500);
  } catch (e) {
    console.error('[send]', e); window.gbxHaptic&&gbxHaptic('error');
    let msg = (e.message || 'unknown error').toString();
    // SCRUB BTC/satoshi/kvB references (stealth)
    msg = msg.replace(/BTC\/kvB/gi, 'GBX/kvB').replace(/\bBTC\b/g, 'GBX').replace(/\bsatoshis?\b/gi, 'sats').replace(/Bitcoin Core/gi, 'GoldBrix Core');
    // Smart detection — friendly message instead of raw JSON
    let friendly;
    if (e && (e.code==='ERR_SOL_NO_GAS' || String(e.message).includes('ERR_SOL_NO_GAS'))) {
      friendly = t('errSolGas').replace('{sol}', (e.needSol!=null ? (Math.ceil(e.needSol*10000)/10000) : 0.003).toString());
      gbxAlert(friendly); showStep('step-form'); return;
    }
    if (e && (e.code==='ERR_SOL_DROPPED' || String(e.message).includes('ERR_SOL_DROPPED'))) {
      friendly = t('errSolDrop');
      gbxAlert(friendly); showStep('step-form'); return;
    }
    const lower = msg.toLowerCase();
    if (e && e.message === 'MAX_PER_TX') {
      friendly = t('errMaxPerTx').replace('{max}', (e.maxPerTx||0).toLocaleString('en-US',{maximumFractionDigits:2}));
    } else if (lower.indexOf('-26') !== -1 && (lower.indexOf('rejecting replacement') !== -1 || lower.indexOf('insufficient fee') !== -1)) {
      friendly = t('errRbf');
    } else if (lower.indexOf('insufficient') !== -1 && lower.indexOf('balance') === -1) {
      friendly = t('errLowFee');
    } else if (lower.indexOf('lp_unavailable') !== -1 || lower.indexOf('broadcast') !== -1 || lower.indexOf('network') !== -1 || lower.indexOf('fetch') !== -1) {
      friendly = t('errBroadcast');
    } else {
      // Fallback: scrubbed message, no JSON
      friendly = msg.replace(/[{}"\\]/g, '').replace(/\\n/g, ' ').replace(/error code:\s*-?\d+/gi, '').replace(/error message:/gi, '').trim();
      if (friendly.length > 150) friendly = friendly.substring(0, 147) + '...';
      if (!friendly) friendly = t('errBroadcast');
    }
    gbxAlert(friendly);
    showStep('step-form');
  }
}

<script>
/* ═══ V4.9 PROMOTE INTEGRATION — prefill + auto-confirm ═══ */
(function(){
  const params = new URLSearchParams(window.location.search);
  const memo = params.get('memo') || '';
  const isPromo = memo.startsWith('PROMO:');
  
  // === STEP 1: Prefill inputs from URL params ===
  function prefill() {
    if (params.has('to')) {
      const toEl = document.getElementById('toAddr');
      if (toEl) { toEl.value = params.get('to'); toEl.dispatchEvent(new Event('input')); }
    }
    if (params.has('amount')) {
      const amtEl = document.getElementById('amount');
      if (amtEl) { amtEl.value = params.get('amount'); amtEl.dispatchEvent(new Event('input')); }
    }
    if (isPromo) {
      // Visual indicator that this is a PROMO send
      const head = document.querySelector('.s-header__title, h1, h2, h3');
      if (head) head.innerHTML = '🚀 ' + head.innerHTML + ' <span style="background:#F0C060;color:#000;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-left:6px;">PROMOTE</span>';
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', prefill);
  } else {
    setTimeout(prefill, 100);
  }
  
  // === STEP 2: Auto-confirm to backend after success ===
  if (!isPromo) return;
  const promoId = memo.substring(6); // skip "PROMO:"
  let confirmed = false;
  
  const observer = new MutationObserver(() => {
    if (confirmed) return;
    const successEl = document.getElementById('step-success');
    if (!successEl) return;
    const visible = window.getComputedStyle(successEl).display !== 'none';
    if (!visible) return;
    
    const txHashEl = document.getElementById('txHash');
    const rawTx = txHashEl ? txHashEl.textContent : '';
    const match = rawTx.match(/[a-f0-9]{64}/i);
    const txHash = match ? match[0].toLowerCase() : '';
    if (!txHash) return;
    
    confirmed = true;
    observer.disconnect();
    
    let pending = {};
    try { pending = JSON.parse(localStorage.getItem('gbx_pending_promo') || '{}'); } catch(e) {}
    
    // Save tx_hash to localStorage BEFORE confirm — enables auto-recovery if confirm fails
    pending.tx_hash = txHash;
    pending.timestamp = Date.now();
    localStorage.setItem('gbx_pending_promo', JSON.stringify(pending));
    
    fetch('https://goldbrix.app/launchpad/promote/confirm', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ promo_id: promoId, tx_hash: txHash })
    }).then(r => r.json()).then(data => {
      localStorage.removeItem('gbx_pending_promo');
      if (data.success) {
        const msg = '🎉 $' + (pending.ticker || 'COIN') + ' promoted!';
        // Add success badge to success screen
        const titleEl = document.getElementById('successTitle');
        if (titleEl) titleEl.textContent = msg;
        const amtEl = document.getElementById('successAmt');
        if (amtEl) amtEl.innerHTML += '<br><span style="color:#F0C060;font-size:11px;margin-top:8px;display:inline-block;">✓ Promotion activated</span>';
        setTimeout(() => { window.location.href = '/'; }, 2500);
      } else {
        gbxAlert('Promote confirm failed: ' + (data.error || 'unknown'));
      }
    }).catch(e => {
      gbxAlert('Promote confirm network error: ' + e.message);
    });
  });
  
  observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style','class'] });
})();
</script>
