<script>
const API = 'https://goldbrix.app';
let knownBurnIds = new Set();
let pollCount = 0;

function fmtGbx(n) {
  if (typeof n !== 'number' || isNaN(n)) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(2) + 'K';
  return n.toFixed(4);
}

function fmtGbxFull(n) {
  if (typeof n !== 'number' || isNaN(n)) return '0';
  return n.toFixed(2);
}

function timeAgo(ts) {
  if (!ts) return '—';
  const t = typeof ts === 'string' ? new Date(ts).getTime() : ts;
  const diff = Date.now() - t;
  const s = Math.floor(diff / 1000);
  if (s < 60) return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  return d + 'd ago';
}

function getBurnIcon(source) {
  if (!source) return '🔥';
  const s = source.toLowerCase();
  if (s.includes('buy')) return '💰';
  if (s.includes('sell')) return '💸';
  if (s.includes('launch')) return '🚀';
  if (s.includes('promote')) return '📢';
  return '🔥';
}

async function loadStats() {
  try {
    const r = await fetch(API + '/v2/memecoin/burns/stats');
    const d = await r.json();
    if (!d.ok) return;
    document.getElementById('totalBurned').textContent = fmtGbxFull(d.all_time_gbx || 0) + ' GBX';
    document.getElementById('totalCount').textContent = (d.all_time_count || 0) + ' transactions';
    document.getElementById('burn24h').textContent = fmtGbx(d.burns_24h_gbx || 0) + ' GBX';
    document.getElementById('burn7d').textContent = fmtGbx(d.burns_7d_gbx || 0) + ' GBX';
    document.getElementById('count24h').textContent = (d.burns_24h_count || 0);
    if (d.last_burn && d.last_burn.ts) {
      document.getElementById('lastBurn').textContent = timeAgo(d.last_burn.ts);
    }
  } catch(e) { console.warn('stats:', e); }
}

async function loadBurns(isInitial) {
  try {
    const r = await fetch(API + '/v2/memecoin/burns/recent?limit=50');
    const d = await r.json();
    if (!d.ok || !d.burns) return;

    const list = document.getElementById('burnList');

    if (isInitial) {
      list.innerHTML = '';
      knownBurnIds.clear();
      if (d.burns.length === 0) {
        list.innerHTML = '<div class="empty-state">' + (window._BURNS_T ? window._BURNS_T.noBurns : 'No burns yet') + '</div>';
        return;
      }
      // Render all initial without animation
      d.burns.forEach(b => {
        const id = b.tx_hash || (b.ts + '_' + b.amount_gbx);
        knownBurnIds.add(id);
        const row = buildBurnRow(b, false);
        list.appendChild(row);
      });
      return;
    }

    // === Non-initial: ONLY prepend NEW burns silently ===
    const newOnes = [];
    d.burns.forEach(b => {
      const id = b.tx_hash || (b.ts + '_' + b.amount_gbx);
      if (!knownBurnIds.has(id)) {
        newOnes.push(b);
        knownBurnIds.add(id);
      }
    });
    // Prepend new ones at top (reverse so latest is on top)
    newOnes.reverse().forEach(b => {
      const row = buildBurnRow(b, true);
      list.insertBefore(row, list.firstChild);
    });
    // Trim to 50 max
    while (list.children.length > 50) list.removeChild(list.lastChild);
  } catch(e) {}
}

function buildBurnRow(b, animate) {
  const row = document.createElement('div');
  row.className = 'burn-row' + (animate ? ' new' : '');
  row.onclick = () => { if (b.tx_hash) window.location.href = '/v3/explorer.html?tx=' + b.tx_hash; };
  row.innerHTML = '<div class="burn-icon">' + getBurnIcon(b.source) + '</div>' +
    '<div class="burn-info">' +
    '<div class="burn-amount">-' + fmtGbxFull(b.amount_gbx || 0) + ' GBX 🔥</div>' +
    '<div class="burn-source">' + (b.source || 'burn').replace(/_/g, ' ') + '</div>' +
    '</div>' +
    '<div class="burn-meta">' +
    '<div class="burn-time">' + timeAgo(b.ts) + '</div>' +
    '<div class="burn-tx">' + (b.tx_hash_short || (b.tx_hash ? b.tx_hash.slice(0, 8) + '...' : '—')) + '</div>' +
    '</div>';
  return row;
}


async function pollAll() {
  await loadStats();
  await loadBurns(false);
    pollCount++;
}

// Initial load
loadStats();
loadBurns(true).then(() => {
  // After initial, mark all known
  setTimeout(() => {
    document.querySelectorAll('.burn-row').forEach(r => r.classList.remove('new'));
  }, 100);
});

// Poll every 3s
setInterval(pollAll, 12000);

// Pause when hidden
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {} // can pause here if needed
});
</script>
