<!DOCTYPE html>
<html lang="en">
<head>
<link rel="prefetch" href="/v3/wallet.html"><link rel="prefetch" href="/v3/trade.html"><link rel="prefetch" href="/v3/launch.html"><link rel="prefetch" href="/v3/burns.html"><link rel="prefetch" href="/v3/settings.html"><link rel="prefetch" href="/v3/favorites.html"><link rel="prefetch" href="/v3/leaderboard.html"><link rel="prefetch" href="/v3/style.css"><link rel="dns-prefetch" href="https://goldbrix.app">
<link rel="preconnect" href="https://goldbrix.app" crossorigin>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1c1610">
<title>GoldBrix · Unlock</title>
<link rel="icon" href="/assets/coin/gbx-coin-32.png">
<link rel="stylesheet" href="/v3/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  .pwd-wrap { position: relative; }
  .pwd-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: transparent; color: var(--text-muted); font-size: 18px; padding: 4px; }
  .pwd-eye:hover { color: var(--gold); }
  .err {
    margin-top: 10px; padding: 10px 14px;
    background: rgba(255, 122, 107, 0.12);
    border: 1px solid var(--red-dim);
    border-radius: var(--r-md);
    color: var(--red); font-size: 12.5px;
    display: none;
  }
  .err.show { display: block; animation: fadeIn 0.3s; }
  .loader { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; margin: 0 auto 8px; animation: spin 1s linear infinite; display: none; }
  .loader.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .crypto-loading { text-align: center; padding: 40px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size:13px; }
  .reset-link {
    display: block; text-align: center; margin-top: 24px;
    font-family: 'JetBrains Mono', monospace; font-size:12px;
    color: var(--text-muted); letter-spacing: 0.1em;
    transition: color var(--t-fast);
  }
  .reset-link:hover { color: var(--red); }

/* V4.9 — Visible placeholders (added 2026-05-27) */
input::placeholder, textarea::placeholder,
input::-webkit-input-placeholder, textarea::-webkit-input-placeholder,
input::-moz-placeholder, textarea::-moz-placeholder {
  color: #eee !important;
  opacity: 1 !important;
}

</style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#F5CC75">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/brand/goldbrix-brand-180.png">
    <script src="/gbx-update-check.js" defer></script>
    <script src="/gbx-native-bridge.js" defer></script>
      <script src="/i18n.js?v=111" defer></script>
<style>#burnTicker,#liveTicker,.burn-ticker,.live-ticker{display:none !important;}</style>
</head>
<body>
<div class="v3-app">
  <div class="v3-container v3-fade-in" style="display: flex; flex-direction: column; min-height: 100vh; justify-content: center;">

    <div class="crypto-loading" id="cryptoLoading">
      <div style="width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; margin: 0 auto 12px; animation: spin 1s linear infinite;"></div>
      <div id="loadingLabel">Loading crypto library...</div>
    </div>

    <div id="main" style="display: none;">
      <div class="v3-text-center" style="padding: 16px 0 28px;">
        <img src="/assets/coin/gbx-coin-128.png" style="width: 84px; height: 84px; filter: drop-shadow(0 0 28px var(--gold-glow-strong));">
        <h2 style="margin-top: 18px; font-size: 24px; font-weight: 800;" id="welcomeTitle">Welcome Back</h2>
        <p style="margin-top: 8px; font-family: 'JetBrains Mono', monospace; font-size:12px; letter-spacing: 0.15em; color: var(--text-secondary);" id="welcomeSub">UNLOCK YOUR WALLET</p>
      </div>

      <div class="pwd-wrap">
        <input type="password" class="v3-input" id="unlockPwd" placeholder="Enter password" autocomplete="current-password" onkeypress="if(event.key==='Enter') tryUnlock()" autofocus>
        <button class="pwd-eye" onclick="togglePwd('unlockPwd', this)">👁</button>
      </div>

      <div class="err" id="errBox"></div>

      <div class="loader v3-mt-md" id="loader"></div>

      <button class="v3-btn v3-btn--primary v3-btn--lg v3-btn--block v3-mt-lg" onclick="tryUnlock()" id="unlockBtn">
        <span id="unlockLabel">UNLOCK</span>
      </button>

      <button class="v3-btn v3-btn--lg v3-btn--block v3-mt-md" onclick="bioUnlock()" id="bioBtn" style="display:none; border:1px solid var(--gold); color:var(--gold); background:transparent;">
        <span id="bioLabel">🔒 Unlock with fingerprint</span>
      </button>

      <a href="#" class="reset-link" onclick="resetWallet(event)" id="forgotLabel">Forgot password? Reset wallet</a>
    </div>

    <div class="v3-footer">v3.0 · PHASE 1.5 LIVE · SELF-CUSTODY</div>
  </div>
</div>

<script type="module" src="/crypto-utils-v2.js?v=111"></script>

<script>
const T = {
  en: { loading: 'Loading crypto library...', welcomeTitle: 'Welcome Back', welcomeSub: 'UNLOCK YOUR WALLET', unlockBtn: 'UNLOCK', forgot: 'Forgot password? Reset wallet', wrong: '✗ Incorrect password', noWallet: 'No wallet found. Create one first.', resetConfirm: '⚠ This will DELETE your wallet permanently. You need your seed phrase to recover. Continue?' },
  ro: { loading: 'Se încarcă...', welcomeTitle: 'Bun venit înapoi', welcomeSub: 'DESCHIDE PORTOFELUL', unlockBtn: 'DESCHIDE', forgot: 'Ai uitat parola? Resetează portofelul', wrong: '✗ Parolă incorectă', noWallet: 'Niciun portofel găsit. Creează unul.', resetConfirm: '⚠ Această acțiune va ȘTERGE portofelul permanent. Ai nevoie de seed phrase pentru recuperare. Continui?' },
  de: { loading: 'Wird geladen...', welcomeTitle: 'Willkommen zurück', welcomeSub: 'WALLET ENTSPERREN', unlockBtn: 'ENTSPERREN', forgot: 'Passwort vergessen? Wallet zurücksetzen', wrong: '✗ Falsches Passwort', noWallet: 'Keine Wallet gefunden.', resetConfirm: '⚠ Dies LÖSCHT die Wallet dauerhaft. Du brauchst die Seed-Phrase zur Wiederherstellung. Fortfahren?' },
  zh: { loading: '加载中...', welcomeTitle: '欢迎回来', welcomeSub: '解锁您的钱包', unlockBtn: '解锁', forgot: '忘记密码？重置钱包', wrong: '✗ 密码错误', noWallet: '未找到钱包。', resetConfirm: '⚠ 这将永久删除您的钱包。需要种子短语才能恢复。继续？' },
  ar: { loading: 'جاري التحميل...', welcomeTitle: 'مرحبا بعودتك', welcomeSub: 'افتح محفظتك', unlockBtn: 'فتح', forgot: 'نسيت كلمة المرور؟ إعادة تعيين المحفظة', wrong: '✗ كلمة مرور خاطئة', noWallet: 'لم يتم العثور على محفظة.', resetConfirm: '⚠ سيؤدي هذا إلى حذف محفظتك نهائيا. تحتاج إلى عبارة البذور للاسترداد. متابعة؟' }
};

var _bioI18n = {
  en:{bioBtn:'🔒 Unlock with fingerprint',bioReason:'Unlock your GoldBrix wallet',bioTitle:'Fingerprint unlock',bioEnableAsk:'Enable fingerprint unlock for faster access next time?',bioFail:'✗ Fingerprint not recognized'},
  ro:{bioBtn:'🔒 Deblochează cu amprenta',bioReason:'Deblochează portofelul GoldBrix',bioTitle:'Deblocare cu amprenta',bioEnableAsk:'Activezi deblocarea cu amprenta pentru acces mai rapid data viitoare?',bioFail:'✗ Amprentă nerecunoscută'},
  de:{bioBtn:'🔒 Mit Fingerabdruck entsperren',bioReason:'GoldBrix-Wallet entsperren',bioTitle:'Fingerabdruck-Entsperrung',bioEnableAsk:'Fingerabdruck-Entsperrung für schnelleren Zugriff aktivieren?',bioFail:'✗ Fingerabdruck nicht erkannt'},
  zh:{bioBtn:'🔒 用指纹解锁',bioReason:'解锁您的 GoldBrix 钱包',bioTitle:'指纹解锁',bioEnableAsk:'下次启用指纹解锁以便更快访问？',bioFail:'✗ 指纹无法识别'},
  ar:{bioBtn:'🔒 فتح ببصمة الإصبع',bioReason:'افتح محفظة GoldBrix',bioTitle:'فتح ببصمة الإصبع',bioEnableAsk:'تفعيل الفتح ببصمة الإصبع لوصول أسرع في المرة القادمة؟',bioFail:'✗ بصمة الإصبع غير معروفة'}
};
try { Object.keys(_bioI18n).forEach(function(l){ if(T[l]) Object.assign(T[l], _bioI18n[l]); }); } catch(e){}
let currentLang = localStorage.getItem('gbx_lang') || 'en';
function t(k) { return (T[currentLang] && T[currentLang][k]) || T.en[k] || k; }

function applyLang() {
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('loadingLabel').textContent = t('loading');
  document.getElementById('welcomeTitle').textContent = t('welcomeTitle');
  document.getElementById('welcomeSub').textContent = t('welcomeSub');
  document.getElementById('unlockLabel').textContent = t('unlockBtn');
  var _bl=document.getElementById('bioLabel'); if(_bl) _bl.textContent = t('bioBtn');
  document.getElementById('forgotLabel').textContent = t('forgot');
}

function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function showError(msg) {
  const e = document.getElementById('errBox');
  e.textContent = msg;
  e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 4000);
}

async function waitForCrypto(maxMs = 8000) {
  const start = Date.now();
  while (!window.GoldbrixCrypto) {
    if (Date.now() - start > maxMs) throw new Error('Crypto timeout');
    await new Promise(r => setTimeout(r, 100));
  }
}

// === Biometric + Haptics (doar in APK; no-op pe web) ===
function _capPlugins(){ try { return (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) ? window.Capacitor.Plugins : null; } catch(e){ return null; } }
var BIO_SERVER = 'goldbrix-wallet';
var _bioBusy = false;
async function bioAvailable(){ var P=_capPlugins(); if(!P||!P.NativeBiometric) return false; try { var r=await P.NativeBiometric.isAvailable(); return !!(r && r.isAvailable); } catch(e){ return false; } }
function bioEnabled(){ return localStorage.getItem('gbx_biometric_enabled')==='1'; }
async function bioGetPwd(){ var P=_capPlugins(); if(!P||!P.NativeBiometric) return null; await P.NativeBiometric.verifyIdentity({ reason: t('bioReason'), title: t('bioTitle') }); var cr=await P.NativeBiometric.getCredentials({ server: BIO_SERVER }); return (cr && cr.password) ? cr.password : null; }
async function bioSetPwd(pwd){ var P=_capPlugins(); if(!P||!P.NativeBiometric) return; await P.NativeBiometric.setCredentials({ username:'gbx', password:pwd, server:BIO_SERVER }); localStorage.setItem('gbx_biometric_enabled','1'); }
async function haptic(kind){ var P=_capPlugins(); if(!P||!P.Haptics) return; try { if(kind==='success') await P.Haptics.notification({ type:'SUCCESS' }); else if(kind==='error') await P.Haptics.notification({ type:'ERROR' }); else await P.Haptics.impact({ style:'MEDIUM' }); } catch(e){} }
async function bioUnlock(){ if(_bioBusy) return; _bioBusy=true; try { var pwd=await bioGetPwd(); if(!pwd){ showError(t('bioFail')); return; } document.getElementById('unlockPwd').value=pwd; tryUnlock(); } catch(e){ try{ await haptic('error'); }catch(_){} } finally { _bioBusy=false; } }
function bioAutoStart(){ var go=function(){ setTimeout(bioUnlock, 350); }; try { if(document.hasFocus && !document.hasFocus()){ window.addEventListener('focus', function _f(){ window.removeEventListener('focus', _f); go(); }, { once:true }); } else { go(); } } catch(e){ go(); } }

async function tryUnlock() {
  const pwd = document.getElementById('unlockPwd').value;
  if (!pwd) return;

  const stateRaw = localStorage.getItem('goldbrix_state_v3');
  if (!stateRaw) {
    showError(t('noWallet'));
    setTimeout(() => window.location.href = '/v3/welcome.html', 1500);
    return;
  }

  const state = JSON.parse(stateRaw);
  if (!state.salt || !state.pwdHash) {
    showError(t('noWallet'));
    return;
  }

  document.getElementById('loader').classList.add('show');
  document.getElementById('unlockBtn').disabled = true;

  try {
    const c = window.GoldbrixCrypto;
    const inputHash = await c.hashPassword(pwd, state.salt);
    if (inputHash !== state.pwdHash) {
      throw new Error('wrong');
    }

    // Decrypt mnemonic into sessionStorage for cross-page access
    const decrypted = {};
    if (state.encryptedMnemonics && state.wallets) {
      for (const w of state.wallets) {
        if (state.encryptedMnemonics[w.id]) {
          decrypted[w.id] = await c.decryptString(state.encryptedMnemonics[w.id], pwd, state.salt);
        }
      }
    }

    sessionStorage.setItem('gbx_unlocked_wallets', JSON.stringify({
      wallets: state.wallets.map(w => ({ ...w, mnemonic: decrypted[w.id] || null })),
      activeWalletId: state.activeWalletId,
      unlocked_at: Date.now()
    }));

    await haptic('success');
    try { if (await bioAvailable()) { if (bioEnabled()) { await bioSetPwd(pwd); } else if (confirm(t('bioEnableAsk'))) { await bioSetPwd(pwd); } } } catch(_e){}
    window.location.href = '/v3/wallet.html';
  } catch (e) {
    document.getElementById('loader').classList.remove('show');
    document.getElementById('unlockBtn').disabled = false;
    await haptic('error');
    showError(t('wrong'));
    document.getElementById('unlockPwd').value = '';
    document.getElementById('unlockPwd').focus();
  }
}

function resetWallet(ev) {
  ev.preventDefault();
  if (!confirm(t('resetConfirm'))) return;
  localStorage.removeItem('goldbrix_state_v3');
  sessionStorage.removeItem('gbx_unlocked_wallets');
  window.location.href = '/v3/welcome.html';
}

(async () => {
  applyLang();
  try {
    await waitForCrypto();
    document.getElementById('cryptoLoading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    document.getElementById('unlockPwd').focus();
    try { if (localStorage.getItem('goldbrix_state_v3') && await bioAvailable() && bioEnabled()) { var _bb=document.getElementById('bioBtn'); if(_bb) _bb.style.display='block'; bioAutoStart(); } } catch(_e){}
  } catch (e) {
    document.getElementById('cryptoLoading').innerHTML = '<div style="color: var(--red);">❌ Crypto library failed.</div>';
  }
})();
</script>
<script src="/v3/pwa.js?v=111" defer></script>



</body>
</html>
