<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GoldBrix</title>
<style>
.gbxfed{min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;background:#120e08;color:#c9bfa8;font-family:system-ui,sans-serif}
.gbxfed .w{max-width:420px;padding:24px 24px 120px}
.gbxfed h2{color:#f0c060;font-size:22px;margin:16px 0 10px}
.gbxfed p{line-height:1.5;margin:0 0 8px}
.gbxfed .f{font-size:56px}
</style></head><body style="margin:0;background:#120e08">
<div class="gbxfed"><div class="w">
 <div class="f">📡</div>
 <h2 id="fedT"></h2><p id="fedB"></p><p id="fedC"></p>
</div></div>
<script>
(function(){
 var L={
  en:{t:'Chat moves to the federation',b:'The central chat server has been retired — a central server fails the test of autonomy.',c:'Chat returns as a federated service after activation: ephemeral messages between nodes, no central server, no stored history.'},
  ro:{t:'Chatul se mută pe federație',b:'Serverul central de chat a fost retras — un server central pică testul autonomiei.',c:'Chatul revine ca serviciu federat după activare: mesaje efemere între noduri, fără server central, fără istoric stocat.'},
  de:{t:'Der Chat zieht in die Föderation',b:'Der zentrale Chat-Server wurde stillgelegt — ein zentraler Server besteht den Autonomie-Test nicht.',c:'Der Chat kehrt nach der Aktivierung als föderierter Dienst zurück: flüchtige Nachrichten zwischen Nodes, ohne zentralen Server, ohne gespeicherten Verlauf.'},
  zh:{t:'聊天迁移至联邦网络',b:'中心化聊天服务器已退役——中心服务器无法通过自治测试。',c:'激活后聊天将以联邦服务回归：节点之间的临时消息，无中心服务器，不存储历史。'},
  ar:{t:'الدردشة تنتقل إلى الاتحاد',b:'تم إيقاف خادم الدردشة المركزي — الخادم المركزي لا يجتاز اختبار الاستقلالية.',c:'تعود الدردشة كخدمة اتحادية بعد التفعيل: رسائل مؤقتة بين العقد، بدون خادم مركزي، وبدون سجل محفوظ.'}
 };
 var g=localStorage.getItem('gbx_lang')||localStorage.getItem('goldbrix_lang')||'en';
 var t=L[g]||L.en;
 if(g==='ar'){var r=document.querySelector('.gbxfed');if(r)r.dir='rtl';}
 document.getElementById('fedT').textContent=t.t;
 document.getElementById('fedB').textContent=t.b;
 document.getElementById('fedC').textContent=t.c;
})();
</script></body></html>
