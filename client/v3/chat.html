*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#0d0a06;color:#f4e9d0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
body{background:#0d0a06;background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(240,192,96,0.18),transparent 60%),radial-gradient(circle at 100% 100%,rgba(240,192,96,0.05),transparent 45%),linear-gradient(180deg,#15100a 0%,#0d0a06 100%);background-attachment:fixed;}
body{padding-bottom:calc(140px + env(safe-area-inset-bottom))}
.c-header{padding:18px 16px 16px;border-bottom:1px solid rgba(240,192,96,0.22);background:linear-gradient(180deg,rgba(240,192,96,0.12),rgba(13,10,6,0.4));backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:center;gap:12px}
.c-header__back{color:#F5CC75;font-size:20px;cursor:pointer;padding:4px 8px;text-decoration:none}

.c-empty{text-align:center;color:#998a72;padding:50px 20px;font-size:14px}
.c-msg{max-width:78%;display:flex;flex-direction:column;gap:3px}
.c-msg--mine{align-self:flex-end;align-items:flex-end}
.c-msg--them{align-self:flex-start;align-items:flex-start}
.c-msg__meta{font-size:10px;color:#998a72;display:flex;gap:8px;padding:0 8px;font-family:'JetBrains Mono',monospace}
.c-msg__bubble{padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.45;word-wrap:break-word;white-space:pre-wrap}
.c-msg--mine .c-msg__bubble{background:linear-gradient(135deg,#F0C060,#D9A838);color:#1a1200;font-weight:600;border-bottom-right-radius:4px;box-shadow:0 2px 10px rgba(240,192,96,0.25)}
.c-msg--them .c-msg__bubble{background:rgba(35,28,18,0.85);border:1px solid rgba(240,192,96,0.18);color:#f4e9d0;border-bottom-left-radius:4px;backdrop-filter:blur(8px)}
.c-msg__toggle{font-size:9px;color:#998a72;padding:0 8px;cursor:pointer;text-decoration:underline;opacity:0.7}
.c-inputbar{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom));left:0;right:0;padding:10px 12px;background:rgba(13,10,6,0.92);border-top:1px solid rgba(240,192,96,0.2);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid #3a3025;display:flex;gap:8px;align-items:flex-end;z-index:99}
.c-input{flex:1;min-height:40px;max-height:100px;padding:10px 12px;background:rgba(35,28,18,0.9);border:1px solid rgba(240,192,96,0.25);border-radius:20px;color:#f4e9d0;font-size:14px;font-family:system-ui,sans-serif;resize:none;outline:none}
.c-input:focus{border-color:#F5CC75}
.c-send{width:46px;height:40px;background:linear-gradient(135deg,#F5CC75,#E0A845);border:none;border-radius:20px;color:#1a140d;font-size:18px;font-weight:800;cursor:pointer;flex-shrink:0}
.c-send:disabled{opacity:0.5;cursor:not-allowed}
.bnav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:#1a140d;border-top:1px solid #3a3025;padding:6px 0;z-index:100}
.bnav__item{display:flex;flex-direction:column;align-items:center;gap:2px;color:#998a72;text-decoration:none;padding:4px 8px;font-size:9px;font-family:'JetBrains Mono',monospace}

function gbxToggleMute(){
  var m=localStorage.getItem('gbx_chat_muted')==='1';

  gbxRenderMute();
}
function gbxRenderMute(){
  var m=localStorage.getItem('gbx_chat_muted')==='1';
  var b=document.getElementById('gbxMuteBtn');
  if(b){ b.textContent=m?'🔕':'🔔'; b.style.opacity=m?'0.55':'1'; }
}
gbxRenderMute();
</script>

var CURRENT_LANG=localStorage.getItem('gbx_lang')||'en';
function t(k){return (T[CURRENT_LANG]||T.en)[k]||k}
function applyLang(){
  var tt=T[CURRENT_LANG]||T.en;
  document.getElementById('hdrTitle').textContent=tt.hdr;
  document.getElementById('rulesBanner').textContent=tt.rules;
  document.getElementById('msgInput').placeholder=tt.placeholder;
  document.getElementById('navHome').textContent=tt.home;
  document.getElementById('navWallet').textContent=tt.wallet;
  document.getElementById('navLaunch').textContent=tt.launch;
  document.getElementById('navTrade').textContent=tt.trade;
  document.getElementById('navBurn').textContent=tt.burn;
  document.getElementById('navSet').textContent=tt.set;
  document.body.dir=(CURRENT_LANG==='ar')?'rtl':'ltr';
}
function getActiveAddress(){
  try{var s=sessionStorage.getItem('gbx_unlocked_wallets');if(s){var u=JSON.parse(s);var w=(u.wallets||[]).find(function(x){return x.id===u.activeWalletId})||(u.wallets||[])[0];if(w&&w.address)return w.address}}catch(e){}
  try{var r=localStorage.getItem('goldbrix_state_v3');if(r){var st=JSON.parse(r);return st.activeAddress||(st.wallets&&st.wallets[0]&&st.wallets[0].address)||null}}catch(e){}
  return null;
}
function shortAddr(a){if(!a)return '';return a.slice(0,6)+'…'+a.slice(-4)}
function timeAgo(ts){var s=Math.floor((Date.now()-ts)/1000);if(s<60)return t('justNow');if(s<3600)return Math.floor(s/60)+t('mAgo');if(s<86400)return Math.floor(s/3600)+t('hAgo');return Math.floor(s/86400)+t('dAgo')}
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show')},2600)}
function renderMessage(m,myAddr){
  var mine=m.address===myAddr;
  var wrap=document.createElement('div');
  wrap.className='c-msg '+(mine?'c-msg--mine':'c-msg--them');
  wrap.dataset.id=m.id;
  var meta=document.createElement('div');meta.className='c-msg__meta';
  var who=document.createElement('span');who.textContent=mine?t('you'):shortAddr(m.address);
  if(!mine){who.style.cursor='pointer';who.style.color='#5cc8e8';who.style.textDecoration='underline';who.title='View wallet';who.onclick=function(ev){ev.stopPropagation();var _u='/v3/wallet-view.html?addr='+encodeURIComponent(m.address); if(!(window.__spaNavTo&&window.__spaNavTo(_u))) window.location.href=_u;};}
  var when=document.createElement('span');when.textContent=timeAgo(m.created_at);
  meta.appendChild(who);meta.appendChild(when);wrap.appendChild(meta);
  var bubble=document.createElement('div');bubble.className='c-msg__bubble';
  // 🛡 ANTI-XSS: textContent NU innerHTML — codul/HTML din mesaj NU se va executa
  bubble.textContent=(m.translated&&!mine)?m.translated:m.message;
  wrap.appendChild(bubble);
  if(m.translated&&m.translated!==m.message&&!mine){
    var toggle=document.createElement('div');toggle.className='c-msg__toggle';toggle.textContent=t('showOriginal');
    var showingT=true;
    toggle.onclick=function(){showingT=!showingT;bubble.textContent=showingT?m.translated:m.message;toggle.textContent=showingT?t('showOriginal'):t('showTranslation')};
    wrap.appendChild(toggle);
  }
  return wrap;
}
var lastTs=0,myAddr=null,pollTimer=null,initialLoad=true;
async function fetchMessages(){
  try{
    var url='https://goldbrix.app/launchpad/chat/messages?lang='+CURRENT_LANG+'&since='+lastTs+'&limit=100';
    var res=await fetch(url);var data=await res.json();
    if(!data.ok||!data.messages)return;
    var list=document.getElementById('messages');
    if(initialLoad){list.innerHTML=''}
    var emptyEl=document.getElementById('emptyState');if(emptyEl&&data.messages.length>0){emptyEl.remove()}
    data.messages.forEach(function(m){
      if(list.querySelector('[data-id="'+m.id+'"]'))return;
      list.appendChild(renderMessage(m,myAddr));
      if(m.created_at>lastTs)lastTs=m.created_at;
    });
    if(list.children.length===0){
      list.innerHTML='<div class="c-empty">'+t('empty')+'</div>';
    }
    if(initialLoad||(window.innerHeight+window.scrollY)>=document.body.offsetHeight-300){
      window.scrollTo({top:document.body.scrollHeight,behavior:initialLoad?'auto':'smooth'});
    }
    initialLoad=false;
  }catch(e){console.error('[chat]',e)}
}
async function sendMessage(){
  var input=document.getElementById('msgInput');var btn=document.getElementById('sendBtn');
  var txt=input.value.trim();if(!txt)return;
  if(!myAddr){showToast(t('noWallet'));return}
  // Client-side warning special pt seed/private key — userul vede de ce nu trimite
  if(/seed phrase|private key|fraza recuperare|cheie privata|cheia privata/i.test(txt)){showToast(t('seedWarn'));return}
  btn.disabled=true;
  try{
    var res=await fetch('https://goldbrix.app/launchpad/chat/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({address:myAddr,message:txt})});
    var data=await res.json();
    if(data.ok){input.value='';input.style.height='auto';setTimeout(fetchMessages,250)}
    else if(data.blocked){showToast(t('blocked_'+data.reason)||('⚠ '+data.reason))}
    else{showToast(t('sendError'))}
  }catch(e){showToast(t('sendError'))}
  finally{btn.disabled=false}
}
window.addEventListener('DOMContentLoaded',function(){
  applyLang();myAddr=getActiveAddress();fetchMessages();
  pollTimer=setInterval(fetchMessages,4000);
  var input=document.getElementById('msgInput');
  input.addEventListener('input',function(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,100)+'px'});
  input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
});
window.addEventListener('beforeunload',function(){if(pollTimer)clearInterval(pollTimer)});
</script>
