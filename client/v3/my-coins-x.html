<style>
:root{--bg:#1c1610;--card:#2a2218;--card2:#241d13;--line:#3a3025;--gold:#F5CC75;
--gold-soft:#FFE099;--ink:#eee;--dim:#c9bfa8;--green:#4EE08C;--red:#FF7A6B;--ember:#e8843a;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);color:var(--ink);
 font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:13px;padding-bottom:86px;}
body[dir="rtl"]{direction:rtl;}
.wrap{max-width:560px;margin:0 auto;padding:14px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
.sect{color:var(--gold);font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;margin:0 0 10px;}
.pgtitle{color:var(--gold);font-weight:800;font-size:17px;letter-spacing:.06em;margin:4px 0 12px;}
.sub{color:#d8cfb8;font-size:12px;line-height:1.6;margin-bottom:12px;}
.coin{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer;}
.coin:last-child{border-bottom:none;}
.coin .logo{width:42px;height:42px;border-radius:50%;background:var(--card2);border:1px solid var(--line);
 display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--gold);font-weight:800;flex-shrink:0;}
.coin .mid{flex:1;min-width:0;}
.coin .tick{color:var(--gold);font-weight:800;font-size:14px;letter-spacing:.05em;}
.coin .nm{color:var(--dim);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.coin .amt{text-align:end;font-weight:800;font-size:13px;color:var(--ink);}
.coin .amt small{display:block;color:var(--dim);font-weight:400;font-size:10px;}
.badge{font-size:9px;font-weight:800;letter-spacing:.12em;padding:3px 7px;border-radius:6px;}
.badge.live{color:var(--green);border:1px solid var(--green);}
.badge.grad{color:var(--gold);border:1px solid var(--gold);}
.gbar{height:10px;background:var(--card2);border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-top:6px;}
.gbar>i{display:block;height:100%;background:linear-gradient(90deg,#F5CC75,#d9a53f);width:0%;transition:width .5s;}
.gnote{color:var(--dim);font-size:10px;margin-top:6px;line-height:1.55;}
.empty{text-align:center;color:#e8dfc8;padding:26px 12px;line-height:1.7;font-size:13px;}
.err{color:var(--red);text-align:center;padding:18px 12px;font-size:12px;line-height:1.6;}
.btn{display:block;text-align:center;background:linear-gradient(135deg,#F5CC75,#d9a53f);color:#1c1610;
 font-weight:800;border:none;border-radius:12px;padding:13px;font-size:13px;text-decoration:none;margin-top:10px;}
.scanline{color:var(--dim);font-size:10px;text-align:center;margin-top:4px;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--gold);
 border-radius:50%;animation:sp 0.8s linear infinite;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="pgtitle" id="tTitle"></div>
  <div class="sub" id="tSub"></div>

  <div class="card">
    <div class="sect" id="tHeld"></div>
    <div id="heldBox"><div class="empty"><span class="spin"></span></div></div>
  </div>

  <div class="card">
    <div class="sect" id="tCreated"></div>
    <div id="createdBox"><div class="empty"><span class="spin"></span></div></div>
  </div>

  <div class="scanline" id="scanLine"></div>
</div>

let L=localStorage.getItem('gbx_lang')||localStorage.getItem('goldbrix_lang')||'en';
if(!TT[L])L='en';
const T=k=>TT[L][k]||TT.en[k]||k;
if(L==='ar')document.body.setAttribute('dir','rtl');
window.addEventListener('pageshow',e=>{if(e.persisted)location.reload();});

const API='https://goldbrix.app';
const $=id=>document.getElementById(id);
$('tTitle').textContent=T('title');
$('tSub').textContent=T('sub');
$('tHeld').textContent=T('held');
$('tCreated').textContent=T('created');

function fmt(nStr){
  const n=BigInt(nStr||'0');
  return n.toLocaleString('en-US');
}
function fmtGbx(sat){
  const s=BigInt(sat||'0');
  const g=Number(s)/1e8;
  return (g>=1000?(g/1000).toFixed(1)+'k':g.toFixed(2))+' GBX';
}
function esc(x){return String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function loadWallet(){try{const raw=sessionStorage.getItem('gbx_unlocked_wallets');if(raw===null)return null;
 const s=JSON.parse(raw);if(s&&s.wallets&&s.wallets.length>0){const w=s.wallets.find(x=>x.id===s.activeWalletId)||s.wallets[0];
 if(w&&w.mnemonic&&w.address&&String(w.mnemonic).trim().split(/\s+/).length===12)return w;}}catch(e){}return null;}

function renderHeld(held){
  const box=$('heldBox');
  if(!held.length){box.innerHTML='<div class="empty">'+esc(T('holdEmpty'))+'</div>';return;}
  box.innerHTML=held.map(c=>{
    const tk=c.ticker?('$'+esc(c.ticker)):esc(c.coin_id.slice(0,8))+'\u2026';
    return '<div class="coin" data-cid="'+esc(c.coin_id)+'">'+
      '<div class="logo">'+esc((c.ticker||'?').slice(0,2))+'</div>'+
      '<div class="mid"><div class="tick">'+tk+'</div>'+
      '<div class="nm">'+esc(c.name||'')+'</div></div>'+
      '<div class="amt">'+fmt(c.amount)+'<small>'+esc(T('tokens'))+'</small></div></div>';
  }).join('');
  box.querySelectorAll('.coin').forEach(el=>el.addEventListener('click',()=>{
    location.href='/v3/coin-x.html?coin='+el.dataset.cid;}));
}

function renderCreated(created){
  const box=$('createdBox');
  if(!created.length){
    box.innerHTML='<div class="empty">'+esc(T('createEmpty'))+'</div>'+
      '<a class="btn" href="/v3/launch-x.html">'+esc(T('create'))+'</a>';
    return;
  }
  box.innerHTML=created.map(c=>{
    const tk=c.ticker?('$'+esc(c.ticker)):esc(c.coin_id.slice(0,8))+'\u2026';
    const grad=c.status!=='live';
    const pct=Math.min(100,Number(c.progress_pct||0));
    return '<div class="coin" data-cid="'+esc(c.coin_id)+'" style="display:block;">'+
      '<div style="display:flex;align-items:center;gap:12px;">'+
      '<div class="logo">'+esc((c.ticker||'?').slice(0,2))+'</div>'+
      '<div class="mid"><div class="tick">'+tk+'</div>'+
      '<div class="nm">'+esc(c.name||'')+' \u00b7 '+esc(T('reserve'))+' '+fmtGbx(c.reserve_sat)+'</div></div>'+
      '<span class="badge '+(grad?'grad':'live')+'">'+esc(grad?T('grad'):T('live'))+'</span></div>'+
      (grad?'':'<div class="gbar"><i style="width:'+pct.toFixed(1)+'%"></i></div>')+
      '</div>';
  }).join('')+'<div class="gnote">'+esc(T('gnote'))+'</div>';
  box.querySelectorAll('.coin').forEach(el=>el.addEventListener('click',()=>{
    location.href='/v3/coin-x.html?coin='+el.dataset.cid;}));
}

async function main(){
  const w=loadWallet();
  if(!w){
    $('heldBox').innerHTML='<div class="err">'+esc(T('nowallet'))+'</div>'+
      '<a class="btn" href="/v3/unlock.html?next='+encodeURIComponent('/v3/my-coins.html')+'">'+esc(T('unlock'))+'</a>';
    $('createdBox').innerHTML='<div class="empty">\u2014</div>';
    return;
  }
  try{
    for(let i=0;i<100&&!window.GoldbrixCrypto;i++)await new Promise(r=>setTimeout(r,100));
    if(!window.GoldbrixCrypto)throw new Error('crypto-not-ready');
    const k=await window.GoldbrixCrypto.deriveKeypairFromMnemonic(w.mnemonic);
    const pkHex=Array.from(new Uint8Array(k.keypair?k.keypair.publicKey:k.publicKey),x=>x.toString(16).padStart(2,'0')).join('');
    const r=await fetch(API+'/api/my-coins/'+pkHex);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    renderHeld(d.held||[]);
    renderCreated(d.created||[]);
    $('scanLine').textContent=T('scanned')+(d.scanned||0);
  }catch(e){
    console.error('[my-coins]',e);
    $('heldBox').innerHTML='<div class="err">'+esc(T('err'))+'</div>';
    $('createdBox').innerHTML='<div class="empty">\u2014</div>';
  }
}
main();
</script>
