<script>
window.GBX_API_BASE='https://goldbrix.app/api'; window.GBX_LP_BASE='https://goldbrix.app/lp';
// IDEE S (partea client): failover PER-REQUEST intre LP-uri. Orice fetch spre gateway
// esuat -> re-selectie LP sanatos din lps.json pentru lantul respectiv -> retry o data.
window.GBX_LP_FETCH = async function(C, pathq){
  async function tryOne(base){
    var c=new AbortController(); var t=setTimeout(function(){c.abort();},6000);
    try{ var r=await fetch(base+pathq,{cache:'no-store',signal:c.signal}); clearTimeout(t);
         if(!r.ok) throw new Error('http '+r.status); return r; }
    catch(e){ clearTimeout(t); throw e; }
  }
  try{ return await tryOne(C.gateway); }catch(e0){}
  try{
    var d=await (await fetch('/lps.json',{cache:'no-store'})).json();
    var ch=Object.keys(window.GBX_CHAINS).find(function(k){return window.GBX_CHAINS[k]===C;});
    for(var i=0;i<d.lps.length;i++){
      var lp=d.lps[i];
      if(lp.base_url===C.gateway) continue;
      if(ch && lp.chains && lp.chains.indexOf(ch)<0) continue;
      try{
        var info=await (await fetch(lp.base_url+'/lp-info',{cache:'no-store'})).json();
        if(!info || !info.lp_evm_addr) continue;
        var r2=await tryOne(lp.base_url);
        C.gateway=lp.base_url; C.lpName=lp.name;
        if(C.kind==='evm') C.lpEvm=info.lp_evm_addr;
        return r2;
      }catch(e1){ continue; }
    }
  }catch(e2){}
  return fetch(C.gateway+pathq); // ultimul: lasa eroarea originala sa iasa onest
};
window.GBX_LP_ENSURE = async function(C){
  try{ await (await window.GBX_LP_FETCH(C,'/quote?usd=1')).json(); }catch(e){}
};
// LP-SWAP-STATUS: statusul unui swap vechi traieste DOAR pe LP-ul care l-a procesat.
// Intreaba TOATE LP-urile din federatie; intoarce primul raspuns TERMINAL (rejected*/refunded*/expired/completed).
// "pending" de la un LP care nu cunoaste hashlock-ul NU e dovada de viata.
window.GBX_LP_SWAP_STATUS = async function(hl){
  var TERM=function(st){ st=String(st||''); return st.indexOf('rejected')===0 || st.indexOf('refunded')===0 || st==='expired' || st==='completed' || st==='archived'; };
  var bases=[];
  try{ var d=await (await fetch('/lps.json',{cache:'no-store'})).json(); bases=(d.lps||[]).map(function(x){return x.base_url;}); }catch(_e){}
  var best=null;
  for(var i=0;i<bases.length;i++){
    try{
      var c=new AbortController(); var t=setTimeout(function(){c.abort();},6000);
      var r=await fetch(bases[i]+'/swap/'+hl,{cache:'no-store',signal:c.signal}); clearTimeout(t);
      if(!r.ok) continue;
      var sw=await r.json();
      if(sw && TERM(sw.status)) return sw;
      if(sw && sw.status && !best) best=sw;
    }catch(_e){}
  }
  return best; // null = niciun LP nu a raspuns
};
// LP-ROUTER: reads /lps.json, health-checks /lp-info, picks first healthy LP per chain.
// Fail-safe: on ANY error keeps the defaults above. founder-lp = ordinary entry.
window.GBX_LP_ROUTE = (async function(){
  try{
    for(var w=0; w<100 && !window.GBX_CHAINS; w++) await new Promise(function(r){setTimeout(r,50);});
    if(!window.GBX_CHAINS) return null;
    var d = await (await fetch('/lps.json',{cache:'no-store'})).json();
    if(!d || !Array.isArray(d.lps) || !d.lps.length) return null;
    async function ok(lp){
      try{
        var c=new AbortController(); var t=setTimeout(function(){c.abort();},4000);
        var i=await (await fetch(lp.base_url+'/lp-info',{cache:'no-store',signal:c.signal})).json();
        clearTimeout(t);
        return (i && i.lp_evm_addr && !(i.breaker && i.breaker.active)) ? i : null;
      }catch(e){ return null; }
    }
    var chosen={};
    for(var ci=0; ci<d.lps.length; ci++){
      var lp=d.lps[ci]; var info=null;
      var chains=lp.chains||[];
      var needed=chains.some(function(ch){ return !chosen[ch]; });
      if(!needed) continue;
      info=await ok(lp);
      if(!info) continue;
      chains.forEach(function(ch){ if(!chosen[ch]) chosen[ch]={base:lp.base_url,name:lp.name,info:info}; });
    }
    Object.keys(chosen).forEach(function(ch){
      if(window.GBX_CHAINS && window.GBX_CHAINS[ch]){
        window.GBX_CHAINS[ch].gateway = chosen[ch].base;
        window.GBX_CHAINS[ch].lpName  = chosen[ch].name;
        if(window.GBX_CHAINS[ch].kind==='evm' && chosen[ch].info.lp_evm_addr) window.GBX_CHAINS[ch].lpEvm = chosen[ch].info.lp_evm_addr;
      }
    });
    if(chosen.base) window.GBX_LP_BASE = chosen.base.base;
    return chosen;
  }catch(e){ return null; }
})();

<style>

  .step.fail .dot{border-color:var(--bad);background:var(--bad)}
  .step .t{font-size:12.5px;color:var(--muted)}
  .step.on .t,.step.done .t{color:var(--ink)}

  .cta{width:100%;margin-top:16px;border:0;border-radius:14px;padding:16px;cursor:pointer;

  .ok{border-color:#2c4a36;background:#0e1a12;color:#9fe0b8}
  footer{margin:16px 2px 0;font-size:10.5px;letter-spacing:.06em;color:var(--muted-d);text-align:center}
  [dir="rtl"] .step .k{margin-left:0;margin-right:auto}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
.cap-warn{color:#b8860b;font-size:.85em;margin-top:4px;display:block}
</style>

/* EXCEPTII: campurile utile raman copiabile (adrese, hash-uri, sume, input) */
input, textarea, .copyable, [data-copyable], .addr, .hash, .txid, code, .gbx-amount, .mono, #gbxCopyHint { -webkit-user-select:text !important; -moz-user-select:text !important; -ms-user-select:text !important; user-select:text !important; -webkit-touch-callout:default !important; }
</style>
<script>
// Anti-copiere: blocheaza copy/contextmenu pe text general, permite pe elemente utile
(function(){
  function isAllowed(el){ if(!el) return false; return !!(el.closest && el.closest('input,textarea,.copyable,[data-copyable],.addr,.hash,.txid,code,.gbx-amount,.mono,#gbxCopyHint')); }
  document.addEventListener('copy', function(e){ if(!isAllowed(e.target) && !window.getSelection().toString().match(/^[a-zA-Z0-9x]{8,}$/)){ /* permite hash/adrese chiar daca selectate */ if(!isAllowed(document.activeElement)){ e.preventDefault(); } } }, true);
  document.addEventListener('contextmenu', function(e){ if(!isAllowed(e.target)) e.preventDefault(); }, true);
  // long-press pe mobil (selectstart) blocat pe text general
  document.addEventListener('selectstart', function(e){ if(!isAllowed(e.target)) e.preventDefault(); }, true);
  // permite mereu copierea prin butoanele "tap to copy" (navigator.clipboard ramane functional)
})();
</script>

  // Verifica pe chain statusul unui lock HTLC: {claimed, refunded, exists}
  async function htlcLockStatus(lockId){
    try{
      if(!lockId) return null;
      const id = lockId.startsWith('0x')? lockId : '0x'+lockId;
      const data = '0xeb84e7f2' + id.replace(/^0x/,'').padStart(64,'0');
      const r = await (await fetch(C.evmRpc,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_call',params:[{to:C.htlc,data:data},'latest']})})).json();
      const out = (r && r.result) || '0x';
      if(out.length < 2+64*8) return null;
      const hexd = out.replace(/^0x/,'');
      const word = (i)=> hexd.slice(i*64,(i+1)*64);
      const sender = '0x'+word(0).slice(24);
      const claimed  = /[1-9a-f]/.test(word(6).slice(-1));
      const refunded = /[1-9a-f]/.test(word(7).slice(-1));
      const exists = sender !== '0x0000000000000000000000000000000000000000';
      return { exists, claimed, refunded };
    }catch(_e){ return null; }
  }

        try{ const sw=await GBX_LP_SWAP_STATUS((p.hashlock||'').toLowerCase()); if(sw && (sw.status==='completed'||sw.status==='claimed'||sw.status==='settled')) _sdone=true; }catch(_e){}
        // SOLANA: gateway-ul nu stie statusul on-chain -> confirma prin history completed cu acelasi sig/hashlock
        if(!_sdone && (p.chain==='solana' || p.claimChain==='solana')){
          try{
            const hist=JSON.parse(localStorage.getItem('gbx_swaps_history')||'[]');

        const m=document.createElement('div'); m.style.marginBottom='8px'; m.textContent=RT('psell')+' ('+usdS+' USDC)'; box.appendChild(m);

        btn.onclick=async()=>{

        };
