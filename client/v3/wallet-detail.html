<script>
const API = 'https://goldbrix.app';
const params = new URLSearchParams(location.search);
const addr = params.get('addr') || '';
const GBX_PRICE_USD = 0.10;

function fmt(n, d) {
  if (typeof n !== 'number' || isNaN(n)) return '0';
  if (d === undefined) d = 2;
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(2) + 'K';
  return n.toFixed(d);
}

function timeAgo(ts) {
  if (!ts) return '—';
  const t = typeof ts === 'string' ? new Date(ts).getTime() : (ts * 1000);
  const diff = Date.now() - t;
  const s = Math.floor(diff / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h';
  return Math.floor(h/24) + 'd';
}

function shortAddr(a) {
  if (!a) return '';
  if (a.length <= 16) return a;
  return a.slice(0, 12) + '...' + a.slice(-6);
}

function copyAddr() {
  if (!addr) return;
  navigator.clipboard.writeText(addr).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✓ COPIED';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function viewExplorer() {
  window.location.href = '/v3/explorer.html?addr=' + addr;
}

async function loadBalance() {
  try {
    const r = await window.gbxRead('/address/' + addr, {quorum:true, field:'spendable_gbx'});
    if (!r.ok) throw new Error('bal');
    const d = await r.json();
    const bal = parseFloat(d.balance_gbx || 0);
    const spend = parseFloat(d.spendable_gbx || 0);
    const imm = bal - spend;
    const bv = document.getElementById('balVal'); if (bv) bv.textContent = fmt(bal, 4) + ' GBX';
    (document.getElementById('balUsd')||{textContent:''}).textContent = '≈ $' + fmt(bal * GBX_PRICE_USD, 2);
    (document.getElementById('balSpend')||{textContent:''}).textContent = fmt(spend, 4) + ' GBX';
    (document.getElementById('balImm')||{textContent:''}).textContent = fmt(imm > 0 ? imm : 0, 4) + ' GBX';
  } catch(e) {
    document.getElementById('balVal').textContent = '0.0000 GBX';
    (document.getElementById('balUsd')||{textContent:''}).textContent = '≈ $0.00';
  }
}

async function loadHoldings() {
  const list = document.getElementById('holdingsList');
  try {
    const r = await fetch(API + '/launchpad/wallet/' + addr + '/holdings');
    const d = await r.json();
    const holdings = d.holdings || [];

    const hCountEl = document.getElementById('hCount'); if (hCountEl) hCountEl.textContent = holdings.length;

    if (holdings.length === 0) {
      list.innerHTML = '<div class="empty-state">No memecoin holdings</div>';
      return;
    }

    list.innerHTML = holdings.map(h => {
      const img = h.image_url ? '<img src="' + h.image_url + '" alt="">' : (h.ticker || '?').charAt(0);
      return '<div class="holding-row" onclick="window.location.href=\'/v3/trade.html?coin=' + (h.id || h.coin_id || h.ticker || '') + '\'">' +
        '<div class="holding-img">' + img + '</div>' +
        '<div class="holding-info">' +
        '<div class="holding-ticker">$' + (h.ticker || '?') + '</div>' +
        '<div class="holding-name">' + (h.name || '') + '</div>' +
        '</div>' +
        '<div class="holding-val">' +
        '<div class="holding-amount">' + fmt(parseFloat(h.amount || h.balance || 0), 0) + '</div>' +
        '<div class="holding-usd">tokens</div>' +
        '</div>' +
        '</div>';
    }).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty-state">Load failed</div>';
  }
}

async function loadTxs() {
  const list = document.getElementById('txList');
  try {
    const r = await fetch(API + '/launchpad/wallet/' + addr + '/trades');
    const d = await r.json();
    const trades = d.trades || [];
    const txCountEl = document.getElementById('txCount'); if (txCountEl) txCountEl.textContent = trades.length;
    if (trades.length === 0) {
      list.innerHTML = '<div class="empty-state">' + wdT('no_trades') + '</div>';
      return;
    }
    list.innerHTML = trades.slice(0, 20).map(tx => {
      const isSell = tx.side === 'sell';
      const icon = isSell ? '🔻' : '🟢';
      const cls = isSell ? 'out' : 'in';
      const meta = (window._coinMeta && window._coinMeta[tx.coin_id]) || {};
      const ticker = meta.ticker || (tx.coin_id||'').slice(0, 6);
      return '<div class="tx-row" onclick="window.location.href=\'/v3/trade.html?coin=' + tx.coin_id + '\'">' +
        '<div class="tx-icon">' + icon + '</div>' +
        '<div class="tx-info">' +
        '<div class="tx-type">' + (isSell ? wdT('sell') : wdT('buy')) + ' $' + ticker + '</div>' +
        '<div class="tx-hash">' + fmt(parseFloat(tx.coin_amount || 0), 0) + ' ' + wdT('tokens') + '</div>' +
        '</div>' +
        '<div class="tx-meta">' +
        '<div class="tx-amount ' + cls + '">' + (isSell ? '+' : '-') + fmt(parseFloat(tx.gbx_amount || 0), 4) + ' GBX</div>' +
        '<div class="tx-time">' + timeAgo(tx.created_at) + '</div>' +
        '</div>' +
        '</div>';
    }).join('');
    window._trades = trades;
    if (typeof loadPnL === 'function') loadPnL();
  } catch(e) {
    list.innerHTML = '<div class="empty-state">' + wdT('load_failed') + '</div>';
  }
}

async function loadBurnsByAddr() {
  try {
    const r = await fetch(API + '/v2/memecoin/leaderboard/burners?period=all&limit=200');
    const d = await r.json();
    const burners = d.burners || [];
    const me = burners.find(b => b.address === addr);
    if (me && me.total_burned_gbx > 0) {
      document.getElementById('burnsSection').style.display = 'block';
      document.getElementById('burnTotal').textContent = fmt(me.total_burned_gbx, 4) + ' GBX';
      document.getElementById('burnCount').textContent = (me.trade_count || 0) + ' ' + wdT('burn_txs');
      const rankEl = document.getElementById('burnRank');
      if (rankEl) rankEl.innerHTML = '🏆 ' + wdT('rank') + ' #' + me.rank + ' ' + wdT('of_word') + ' ' + burners.length + ' ' + wdT('burners');
    }
  } catch(e) {}
}

// === V4.9 — i18n self-contained (5 langs) ===
const WD_I18N = {
  en: { follow:'⭐ FOLLOW', following:'✓ FOLLOWING', pnl_title:'📊 PORTFOLIO P&L', no_trades:'No trades yet', load_failed:'Load failed', buy:'BUY', sell:'SELL', tokens:'tokens', rank:'RANK', of_word:'of', burners:'burners', burn_txs:'burn transactions' },
  ro: { follow:'⭐ URMĂREȘTE', following:'✓ URMĂRIT', pnl_title:'📊 PORTOFOLIU P&L', no_trades:'Fără tranzacții', load_failed:'Eroare încărcare', buy:'CUMPĂRĂ', sell:'VINDE', tokens:'tokenuri', rank:'RANG', of_word:'din', burners:'arzători', burn_txs:'tranzacții burn' },
  de: { follow:'⭐ FOLGEN', following:'✓ GEFOLGT', pnl_title:'📊 PORTFOLIO G&V', no_trades:'Keine Trades', load_failed:'Ladefehler', buy:'KAUFEN', sell:'VERKAUFEN', tokens:'Tokens', rank:'RANG', of_word:'von', burners:'Verbrenner', burn_txs:'Burn-Transaktionen' },
  zh: { follow:'⭐ 关注', following:'✓ 已关注', pnl_title:'📊 投资组合盈亏', no_trades:'暂无交易', load_failed:'加载失败', buy:'买入', sell:'卖出', tokens:'代币', rank:'排名', of_word:'/', burners:'销毁者', burn_txs:'销毁交易' },
  ar: { follow:'⭐ متابعة', following:'✓ تتم المتابعة', pnl_title:'📊 أرباح وخسائر المحفظة', no_trades:'لا توجد صفقات', load_failed:'فشل التحميل', buy:'شراء', sell:'بيع', tokens:'رمز', rank:'المرتبة', of_word:'من', burners:'حارقون', burn_txs:'معاملات الحرق' }
};
function wdLang() {
  try { return localStorage.getItem('gbx_lang') || localStorage.getItem('goldbrix_lang') || localStorage.getItem('lang') || (window.currentLang) || 'en'; } catch(e) { return 'en'; }
}
function wdT(k) { const L = wdLang(); return (WD_I18N[L] && WD_I18N[L][k]) || WD_I18N.en[k] || k; }

// === Coin meta cache ===
window._coinMeta = {};
window._trades = [];
async function loadCoinMeta() {
  try {
    const r = await fetch(API + '/v2/memecoin/list?limit=500');
    const d = await r.json();
    const coins = d.coins || d.list || (Array.isArray(d) ? d : []) || [];
    coins.forEach(co => {
      const id = co.id || co.coin_id;
      if (id) window._coinMeta[id] = { ticker:co.ticker, name:co.name, image_url:co.image_url, current_price:parseFloat(co.price_gbx || co.price || 0) };
    });
  } catch(e) {}
}

// === A: P&L Card ===
async function loadPnL() {
  try {
    const trades = window._trades || [];
    if (!trades.length) return;
    const byCoins = {};
    trades.forEach(t => {
      if (!byCoins[t.coin_id]) byCoins[t.coin_id] = { buys:[], sells:[] };
      (t.side === 'buy' ? byCoins[t.coin_id].buys : byCoins[t.coin_id].sells).push(t);
    });
    let totalCost = 0, totalValue = 0;
    Object.keys(byCoins).forEach(coinId => {
      const { buys, sells } = byCoins[coinId];
      const totalBought = buys.reduce((s,t) => s + parseFloat(t.coin_amount||0), 0);
      const totalSold = sells.reduce((s,t) => s + parseFloat(t.coin_amount||0), 0);
      const remaining = Math.max(0, totalBought - totalSold);
      if (remaining <= 0) return;
      const totalCostBuys = buys.reduce((s,t) => s + parseFloat(t.gbx_amount||0), 0);
      const avgBuy = totalBought > 0 ? (totalCostBuys / totalBought) : 0;
      const cur = (window._coinMeta[coinId] && window._coinMeta[coinId].current_price) || 0;
      totalCost += remaining * avgBuy;
      totalValue += remaining * cur;
    });
    const pnlPct = totalCost > 0 ? ((totalValue - totalCost) / totalCost * 100) : 0;
    const pnlAbs = totalValue - totalCost;
    const sec = document.getElementById('pnlSection');
    if (sec) {
      sec.style.display = 'block';
      document.getElementById('pnlTitle').textContent = wdT('pnl_title');
      document.getElementById('pnlValueGbx').textContent = fmt(totalValue, 2) + ' GBX';
      document.getElementById('pnlValueUsd').textContent = '$' + fmt(totalValue * GBX_PRICE_USD, 2);
      const pctEl = document.getElementById('pnlPct');
      pctEl.textContent = (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%';
      pctEl.style.color = pnlPct >= 0 ? '#4EE08C' : '#ff6644';
      document.getElementById('pnlAbs').textContent = (pnlAbs >= 0 ? '+' : '') + fmt(pnlAbs, 4) + ' GBX';
    }
  } catch(e) {}
}

// === E: Follow Wallet ===
function getFollowed() { try { return JSON.parse(localStorage.getItem('gbx_followed_wallets') || '[]'); } catch(e) { return []; } }
function toggleFollow() {
  let list = getFollowed();
  const idx = list.indexOf(addr);
  if (idx >= 0) list.splice(idx, 1); else list.push(addr);
  localStorage.setItem('gbx_followed_wallets', JSON.stringify(list));
  updateFollowButton();
}
function updateFollowButton() {
  const btn = document.getElementById('followBtn');
  if (!btn) return;
  const following = getFollowed().indexOf(addr) >= 0;
  btn.innerHTML = following ? wdT('following') : wdT('follow');
  btn.style.background = following ? 'linear-gradient(135deg,#4EE08C,#2db86d)' : 'linear-gradient(135deg,#F5CC75,#d4a847)';
  btn.style.color = '#000';
}

// === Inject UI DOM ===
function injectV49UI() {
  const head = document.querySelector('.v3-topbar, .v3-header, header, .topbar');
  if (head && !document.getElementById('followBtn')) {
    const btn = document.createElement('button');
    btn.id = 'followBtn';
    btn.onclick = toggleFollow;
    btn.style.cssText = 'border:none;border-radius:8px;padding:6px 12px;font-family:JetBrains Mono,monospace;font-size:10px;font-weight:800;letter-spacing:0.05em;cursor:pointer;margin-left:auto;';
    head.appendChild(btn);
  }
  const holdingsCard = document.querySelector('#holdingsList');
  if (holdingsCard && !document.getElementById('pnlSection')) {
    const sec = document.createElement('div');
    sec.id = 'pnlSection';
    sec.style.cssText = 'display:none;background:linear-gradient(135deg,#1a1208 0%,#2a1f0a 100%);border:1px solid #F0C060;border-radius:12px;padding:16px;margin:16px;text-align:center;';
    sec.innerHTML = '<div id="pnlTitle" style="color:#F5CC75;font-size:11px;letter-spacing:0.1em;font-weight:700;margin-bottom:8px;">' + wdT('pnl_title') + '</div>' +
      '<div id="pnlValueGbx" style="color:#fff;font-size:24px;font-weight:800;font-family:JetBrains Mono,monospace;">— GBX</div>' +
      '<div id="pnlValueUsd" style="color:#F5CC75;font-size:13px;margin:4px 0;">$0.00</div>' +
      '<div style="display:flex;justify-content:center;gap:12px;margin-top:8px;">' +
      '<div id="pnlPct" style="font-size:14px;font-weight:800;font-family:JetBrains Mono,monospace;">+0%</div>' +
      '<div id="pnlAbs" style="color:#aaa;font-size:12px;font-family:JetBrains Mono,monospace;">0 GBX</div>' +
      '</div>';
    (holdingsCard.closest('.card, .v3-card, section') || holdingsCard).parentNode.insertBefore(sec, holdingsCard.closest('.card, .v3-card, section') || holdingsCard);
  }
  const burnsCard = document.getElementById('burnsSection');
  if (burnsCard && !document.getElementById('burnRank')) {
    const rank = document.createElement('div');
    rank.id = 'burnRank';
    rank.style.cssText = 'color:#F5CC75;font-weight:800;font-size:13px;margin-bottom:6px;letter-spacing:0.05em;';
    burnsCard.insertBefore(rank, burnsCard.firstChild);
  }
  updateFollowButton();
  // Re-render on lang change
  window.addEventListener('storage', e => {
    if (e.key && e.key.indexOf('lang') > -1) {
      updateFollowButton();
      if (typeof loadTxs === 'function') loadTxs();
      if (typeof loadBurnsByAddr === 'function') loadBurnsByAddr();
      if (typeof loadPnL === 'function') loadPnL();
    }
  });
}

// Init
if (!addr) {
  document.getElementById('addrFull').textContent = 'No address provided';
} else {
  document.getElementById('addrFull').textContent = addr;
  
  // V4.9 — Clean parallel init, no duplicates
  try { injectV49UI(); } catch(e) { console.error('[V49] injectV49UI:', e); }
  try { loadCoinMeta(); } catch(e) { console.error('[V49] coinMeta:', e); }
  try { loadBalance(); } catch(e) { console.error('[V49] balance:', e); }
  try { loadHoldings(); } catch(e) { console.error('[V49] holdings:', e); }
  try { loadTxs(); } catch(e) { console.error('[V49] txs:', e); }
  try { loadBurnsByAddr(); } catch(e) { console.error('[V49] burns:', e); }
  // Silent refresh
  setInterval(loadBalance, 30000);
  setInterval(loadHoldings, 30000);
  setInterval(loadTxs, 30000);
}

window.copyAddr = copyAddr;
window.viewExplorer = viewExplorer;
</script>
