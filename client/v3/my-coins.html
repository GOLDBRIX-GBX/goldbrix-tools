  .mc-empty { text-align:center; padding:50px 24px; }

  .mc-empty__sub { font-size:14px; color:var(--text-secondary); margin-bottom:18px; }

<script>
const API = 'https://goldbrix.app';
const T = {
  en: { back:'Wallet', title:'My Memes', sub:'COINS YOU CREATED', total:'Total Market Cap', mc:'GBX MC', curve:'ON CURVE', grad:'GRADUATED', emptyTitle:'No coins created yet', emptySub:'Launch your first memecoin to see it here', launch:'\u{1F680} Launch a Coin', loading:'Loading...', navHome:'HOME', navWallet:'WALLET', navLaunch:'LAUNCH', navBurns:'BURNS', navSettings:'SETTINGS' },
  ro: { back:'Portofel', title:'Memele Mele', sub:'MONEDE CREATE DE TINE', total:'Capitalizare Total\u0103', mc:'GBX MC', curve:'PE CURB\u0102', grad:'GRADUAT', emptyTitle:'Nicio moned\u0103 creat\u0103 \u00eenc\u0103', emptySub:'Lanseaz\u0103 prima ta moned\u0103 s\u0103 apar\u0103 aici', launch:'\u{1F680} Lanseaz\u0103 o Moned\u0103', loading:'Se \u00eencarc\u0103...', navHome:'ACAS\u0102', navWallet:'PORTOFEL', navLaunch:'LANSARE', navBurns:'ARDERI', navSettings:'SET\u0102RI' },
  de: { back:'Wallet', title:'Meine Memes', sub:'VON DIR ERSTELLTE COINS', total:'Gesamt-Marktkap.', mc:'GBX MC', curve:'AUF KURVE', grad:'GRADUIERT', emptyTitle:'Noch keine Coins erstellt', emptySub:'Starte deinen ersten Memecoin', launch:'\u{1F680} Coin starten', loading:'Wird geladen...', navHome:'HOME', navWallet:'WALLET', navLaunch:'STARTEN', navBurns:'BURNS', navSettings:'EINSTELL.' },
  zh: { back:'\u94b1\u5305', title:'\u6211\u7684\u6a21\u56e0', sub:'\u4f60\u521b\u5efa\u7684\u4ee3\u5e01', total:'\u603b\u5e02\u503c', mc:'GBX \u5e02\u503c', curve:'\u66f2\u7ebf\u4e2d', grad:'\u5df2\u6bd5\u4e1a', emptyTitle:'\u5c1a\u672a\u521b\u5efa\u4ee3\u5e01', emptySub:'\u53d1\u884c\u4f60\u7684\u7b2c\u4e00\u4e2a\u6a21\u56e0\u5e01', launch:'\u{1F680} \u53d1\u884c\u4ee3\u5e01', loading:'\u52a0\u8f7d\u4e2d...', navHome:'\u9996\u9875', navWallet:'\u94b1\u5305', navLaunch:'\u53d1\u884c', navBurns:'\u71c3\u70e7', navSettings:'\u8bbe\u7f6e' },
  ar: { back:'\u0645\u062d\u0641\u0638\u0629', title:'\u0645\u064a\u0645\u0627\u062a\u064a', sub:'\u0627\u0644\u0639\u0645\u0644\u0627\u062a \u0627\u0644\u062a\u064a \u0623\u0646\u0634\u0623\u062a\u0647\u0627', total:'\u0625\u062c\u0645\u0627\u0644\u064a \u0627\u0644\u0642\u064a\u0645\u0629 \u0627\u0644\u0633\u0648\u0642\u064a\u0629', mc:'GBX \u0633\u0648\u0642\u064a\u0629', curve:'\u0639\u0644\u0649 \u0627\u0644\u0645\u0646\u062d\u0646\u0649', grad:'\u0645\u062a\u062e\u0631\u062c', emptyTitle:'\u0644\u0645 \u062a\u0646\u0634\u0626 \u0639\u0645\u0644\u0627\u062a \u0628\u0639\u062f', emptySub:'\u0623\u0637\u0644\u0642 \u0623\u0648\u0644 \u0639\u0645\u0644\u0629 \u0645\u064a\u0645 \u0644\u0643', launch:'\u{1F680} \u0625\u0637\u0644\u0627\u0642 \u0639\u0645\u0644\u0629', loading:'\u062c\u0627\u0631 \u0627\u0644\u062a\u062d\u0645\u064a\u0644...', navHome:'\u0627\u0644\u0631\u0626\u064a\u0633\u064a\u0629', navWallet:'\u0645\u062d\u0641\u0638\u0629', navLaunch:'\u0625\u0637\u0644\u0627\u0642', navBurns:'\u062d\u0631\u0642', navSettings:'\u0625\u0639\u062f\u0627\u062f\u0627\u062a' }
};
let L = localStorage.getItem('gbx_lang') || 'en';
function t(k){ return (T[L] && T[L][k]) || T.en[k] || k; }
function applyLang(){
  if (L === 'ar') document.documentElement.dir = 'rtl';
  document.getElementById('backLabel').textContent = t('back');
  document.getElementById('heroTitle').textContent = t('title');
  document.getElementById('heroSub').textContent = t('sub');
  document.querySelectorAll('[data-t]').forEach(function(el){ var k=el.getAttribute('data-t'); if(T[L]&&T[L][k]) el.textContent=T[L][k]; });
}
function sparkSVG(prices, up){
  if(!prices || prices.length<2) return '';
  var w=54,h=24,min=Math.min.apply(null,prices),max=Math.max.apply(null,prices),rng=(max-min)||1;
  var pts=prices.map(function(p,i){ return (i/(prices.length-1)*w).toFixed(1)+','+(h-((p-min)/rng)*h).toFixed(1); }).join(' ');
  var col=up?'#4ee08c':'#ff7a6b';
  return '<svg class="coin-card__spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linejoin="round"/></svg>';
}
function fmtGbx(n){ n=Number(n)||0; if(n>=1e6)return (n/1e6).toFixed(2)+'M'; if(n>=1e3)return (n/1e3).toFixed(2)+'K'; return n.toLocaleString('en-US',{maximumFractionDigits:2}); }
function getAddr(){
  var p=new URLSearchParams(location.search); var a=p.get('addr');
  if(a && /^bn1q[a-z0-9]{30,}$/i.test(a)) return a;
  try{ var w=JSON.parse(sessionStorage.getItem('gbx_unlocked_wallets')||'{}'); if(w.wallets&&w.wallets[0]&&w.wallets[0].address) return w.wallets[0].address; }catch(e){}
  if(window.activeWallet&&window.activeWallet.address) return window.activeWallet.address;
  return null;
}
async function load(){
  var wrap=document.getElementById('listWrap'); var addr=getAddr();
  if(!addr){ wrap.innerHTML='<div class="mc-empty"><div class="mc-empty__title">'+t('emptyTitle')+'</div></div>'; return; }
  try{
    var r=await fetch(API+'/v2/memecoin/list?creator='+addr); var d=await r.json();
    // GBX — backend ignora ?creator, deci filtram REAL in frontend pe adresa curenta
    var coins=(d.coins||d.memecoins||[]).filter(function(c){ return c.creator === addr; });
    if(!coins.length){
      wrap.innerHTML='<div class="mc-empty"><div class="mc-empty__title">'+t('emptyTitle')+'</div><div class="mc-empty__sub">'+t('emptySub')+'</div><a class="mc-launch-btn" href="/v3/launch.html">'+t('launch')+'</a></div>';
      document.getElementById('heroTotal').textContent=''; return;
    }
    // GBX — market cap REAL din /stats (market_cap_gbx din lista e umflat)
    var statsArr=await Promise.all(coins.map(function(c){return fetch(API+'/launchpad/coins/'+c.id+'/stats').then(function(r){return r.json();}).catch(function(){return null;});}));
    coins.forEach(function(c,i){ var st=statsArr[i]||{}; c._realMc=Number(st.market_cap)||0; });
    coins.sort(function(a,b){ return (b._realMc||0)-(a._realMc||0); });
    var totalMc=0;
    var html=coins.map(function(c){
      var mc=Number(c._realMc)||0; totalMc+=mc;
      var tk=String(c.ticker||'?').toUpperCase(); var name=(c.name||tk);
      var img=c.image_url||'/assets/coin/gbx-coin-128.png';
      var isGrad=c.graduated==1||c.graduated===true;
      var badge=isGrad?'<span class="mc-badge mc-badge--grad">'+t('grad')+'</span>':'<span class="mc-badge mc-badge--curve">'+t('curve')+'</span>';
      var ch=c.change_24h_pct;
      var chHtml='';
      if(ch!=null && !isNaN(ch)){ var cls=ch>0?'ch-up':(ch<0?'ch-dn':'ch-flat'); var sg=ch>0?'+':''; chHtml='<div class="coin-card__ch '+cls+'">'+sg+Number(ch).toFixed(1)+'%</div>'; }
      return '<div class="coin-card" data-cid="'+c.id+'" onclick="location.href=\'/v3/trade.html?coin='+c.id+'\'">'+
        '<img class="coin-card__img" src="'+img+'" onerror="this.src=\'/assets/coin/gbx-coin-128.png\'">'+
        '<div class="coin-card__info"><div class="coin-card__name">$'+tk+' '+badge+'</div><div class="coin-card__meta">'+name+'</div></div>'+
        '<div class="spark-slot" style="flex-shrink:0;"></div>'+
        '<div class="coin-card__right"><div class="coin-card__mc">'+fmtGbx(mc)+'</div><div class="coin-card__mclbl">'+t('mc')+'</div>'+chHtml+'</div>'+
      '</div>';
    }).join('');
    wrap.innerHTML=html;
    document.getElementById('heroTotal').textContent=t('total')+': '+fmtGbx(totalMc)+' GBX';
    // GBX — sparkline async per card (din /candles)
    document.querySelectorAll('.coin-card[data-cid]').forEach(async function(card){
      var cid=card.getAttribute('data-cid'); var slot=card.querySelector('.spark-slot'); if(!slot) return;
      try{
        var rc=await fetch(API+'/launchpad/coins/'+cid+'/candles?interval=1h&limit=24');
        var dc=await rc.json(); var cd=Array.isArray(dc)?dc:(dc.candles||[]);
        var closes=cd.map(function(x){return Number(x.close);}).filter(function(p){return p>0;});
        if(closes.length>=2){ var up=closes[closes.length-1]>=closes[0]; slot.innerHTML=sparkSVG(closes,up); }
      }catch(e){}
    });
  }catch(e){ wrap.innerHTML='<div class="mc-empty"><div class="mc-empty__title">\u26a0 '+t('loading')+'</div></div>'; }
}
applyLang(); load();
setInterval(load, 20000); // GBX — auto-refresh silentios
</script>
