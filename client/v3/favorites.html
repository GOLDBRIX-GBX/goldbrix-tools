<script>
const T = {
  en: { back:'Wallet', title:'⭐ Favorites', sub:'YOUR WATCHLIST · QUICK ACCESS', core:'CORE', favs:'YOUR FAVORITES', emptyTitle:'No favorites yet', emptySub:'Tap ⭐ on any coin to save it here', browseCoins:'Browse Memecoins', removed:'☆ Removed', nav:{h:'HOME',w:'WALLET',l:'LAUNCH',b:'BURNS',s:'SETTINGS'} },
  ro: { back:'Portofel', title:'⭐ Favorite', sub:'LISTA TA · ACCES RAPID', core:'PRINCIPAL', favs:'FAVORITELE TALE', emptyTitle:'Niciun favorit încă', emptySub:'Apasă ⭐ pe orice monedă să o salvezi aici', browseCoins:'Vezi Memecoins', removed:'☆ Eliminat', nav:{h:'ACASĂ',w:'PORTOFEL',l:'LANSARE',b:'ARDERI',s:'SETĂRI'} },
  de: { back:'Wallet', title:'⭐ Favoriten', sub:'BEOBACHTUNGSLISTE · SCHNELLZUGRIFF', core:'KERN', favs:'DEINE FAVORITEN', emptyTitle:'Noch keine Favoriten', emptySub:'Tippe ⭐ auf eine Münze um sie zu speichern', browseCoins:'Memecoins ansehen', removed:'☆ Entfernt', nav:{h:'HOME',w:'WALLET',l:'STARTEN',b:'BURNS',s:'EINSTELL.'} },
  zh: { back:'钱包', title:'⭐ 收藏', sub:'你的关注 · 快速访问', core:'核心', favs:'你的收藏', emptyTitle:'暂无收藏', emptySub:'点击任何代币上的⭐保存', browseCoins:'浏览模因币', removed:'☆ 已移除', nav:{h:'首页',w:'钱包',l:'发行',b:'燃烧',s:'设置'} },
  ar: { back:'محفظة', title:'⭐ المفضلة', sub:'قائمتك · وصول سريع', core:'الأساسي', favs:'مفضلاتك', emptyTitle:'لا توجد مفضلات بعد', emptySub:'انقر ⭐ على أي عملة لحفظها', browseCoins:'تصفح العملات', removed:'☆ تمت الإزالة', nav:{h:'الرئيسية',w:'محفظة',l:'إطلاق',b:'حرق',s:'إعدادات'} }
};

const FAV_KEY = 'gbx_favorites';
let currentLang = localStorage.getItem('gbx_lang') || 'en';
function t(k) { return (T[currentLang]||T.en)[k] || T.en[k] || k; }

function getFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch(e) { return []; }
}
function setFavs(arr) { localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }
function removeFav(id) {
  const f = getFavs().filter(x => x !== id);
  setFavs(f);
  showToast(t('removed'));
  loadFavs();
}

function showToast(msg) {
  const e = document.querySelector('.toast'); if (e) e.remove();
  const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(), 1800);
}

function applyLang() {
  const tt = T[currentLang]||T.en;
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('backLabel').textContent = tt.back;
  document.getElementById('hTitle').textContent = tt.title;
  document.getElementById('hSub').textContent = tt.sub;
  document.getElementById('lblCore').textContent = tt.core;
  document.getElementById('lblFavs').textContent = tt.favs;
  document.getElementById('nH').textContent = tt.nav.h;
  document.getElementById('nW').textContent = tt.nav.w;
  document.getElementById('nL').textContent = tt.nav.l;
  document.getElementById('nB').textContent = tt.nav.b;
  document.getElementById('nS').textContent = tt.nav.s;
}

async function loadGBX() {
  let bal = 0;
  try {
    const unlocked = JSON.parse(sessionStorage.getItem('gbx_unlocked_wallets') || '{}');
    const w = (unlocked.wallets || []).find(x => x.id === unlocked.activeWalletId) || (unlocked.wallets || [])[0];
    if (w && w.address) {
      const r = await window.gbxRead('/address/' + w.address);
      if (r.ok) { const d = await r.json(); bal = parseFloat(d.spendable_gbx) || 0; }
    }
  } catch(e) {}
  document.getElementById('gbxCard').innerHTML =
    '<div class="coin-card coin-card--gbx" onclick="window.location.href=\'/v3/wallet.html\'">' +
      '<img class="coin-card__img" src="/assets/coin/gbx-coin-128.png" alt="GBX">' +
      '<div class="coin-card__info"><div class="coin-card__name">GOLDBRIX (GBX)</div><div class="coin-card__meta">' + bal.toLocaleString('en-US',{maximumFractionDigits:4}) + ' GBX · $' + (bal*0.1).toFixed(2) + '</div></div>' +
      '<div class="coin-card__price">$0.10</div>' +
    '</div>';
}

async function loadFavs() {
  const list = document.getElementById('favList');
  if (!list) { return; }
  const favs = JSON.parse(localStorage.getItem('gbx_favorites') || '[]');
  if (favs.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-state__icon">⭐</div><div class="empty-state__title">No favorites yet</div></div>';
    return;
  }
  list.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;font:12px monospace;">⏳ Fetching ' + favs.length + ' coin(s)...</div>';
  let coins = [];
  try {
    const r = await fetch('https://goldbrix.app/v2/memecoin/list');
    const d = await r.json();
    coins = d.coins || [];
    } catch(e) {
    list.innerHTML = '<div style="padding:20px;color:#ff4444;font:11px monospace;">FETCH ERROR: ' + e.message + '</div>';
    return;
  }
  const favsStr = favs.map(f => String(f));
  const favsUp = favsStr.map(f => f.toUpperCase());
  const matched = coins.filter(c => {
    const cid = String(c.coin_id || c.id || '');
    const tk = String(c.ticker || '').toUpperCase();
    return favsStr.includes(cid) || favsUp.includes(cid.toUpperCase()) || favsUp.includes(tk);
  });
  if (matched.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:#ff8800;font:11px monospace;">⚠️ ' + favs.length + ' favorite(s) BUT 0 matched in API.<br><br>Stored IDs:<br>' + favs.map(f=>'• ' + f).join('<br>') + '<br><br>API has ' + coins.length + ' coins.</div>';
    return;
  }
  try {
    list.innerHTML = matched.map(c => {
      const id = c.coin_id || c.id || '';
      const tk = (c.ticker || 'TOK').toUpperCase();
      const img = c.image_url || '/assets/coin/gbx-coin-32.png';
      const mc = (c.market_cap_gbx || 0).toLocaleString('en-US',{maximumFractionDigits:2});
      const ch = c.change_24h_pct || 0;
      const chCls = ch > 0 ? 'coin-card__price--green' : (ch < 0 ? 'coin-card__price--red' : '');
      const chTxt = (ch > 0 ? '+' : '') + ch.toFixed(2) + '%';
      return '<div class="coin-card">' +
        '<img class="coin-card__img" src="' + img + '" onerror="this.src=\'/assets/coin/gbx-coin-32.png\'">' +
        '<div class="coin-card__info" onclick="window.location.href=\'/trade.html?coin=' + id + '\'" style="cursor:pointer;"><div class="coin-card__name">$' + tk + '</div><div class="coin-card__meta">MC ' + mc + ' GBX · <span class="' + chCls + '">' + chTxt + '</span></div></div>' +
        '<span class="coin-card__star" onclick="removeFav(\'' + id + '\')">⭐</span>' +
      '</div>';
    }).join('');
    } catch(e) {
    list.innerHTML = '<div style="padding:20px;color:#ff4444;font:11px monospace;">RENDER ERROR: ' + e.message + '</div>';
  }
}

(function init(){ applyLang(); loadGBX(); loadFavs(); })();
</script>
