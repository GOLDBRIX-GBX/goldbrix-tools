<style>
  /* Silent refresh */
  #lbList * { animation-duration: 0s !important; transition: none !important; }

  .lb-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; padding: 4px; background: var(--bg-card); border-radius: var(--r-md); border: 1px solid var(--border); }
  .lb-tab { padding: 11px 4px; border: none; background: transparent; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size:12px; font-weight: 700; letter-spacing: 0.08em; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
  .lb-tab.active { background: linear-gradient(135deg, var(--gold) 0%, var(--gold-deep) 100%); color: #000; box-shadow: 0 3px 14px rgba(245,204,117,0.3); }

  .lb-period { display: flex; gap: 4px; margin-bottom: 12px; }
  .lb-period-btn { flex: 1; padding: 8px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size:11px; font-weight: 700; letter-spacing: 0.1em; border-radius: 8px; cursor: pointer; }
  .lb-period-btn.active { background: var(--gold-deep); color: #000; border-color: var(--gold); }

  .lb-list { display: flex; flex-direction: column; gap: 6px; min-height: 200px; }
  .lb-row { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--bg-card); border-radius: var(--r-md); border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s; }
  .lb-row:hover { border-color: var(--gold); }
  .lb-row.rank-1 { background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, var(--bg-card) 60%); border-color: rgba(255,215,0,0.3); }
  .lb-row.rank-2 { background: linear-gradient(135deg, rgba(192,192,192,0.08) 0%, var(--bg-card) 60%); border-color: rgba(192,192,192,0.3); }
  .lb-row.rank-3 { background: linear-gradient(135deg, rgba(205,127,50,0.08) 0%, var(--bg-card) 60%); border-color: rgba(205,127,50,0.3); }

  .lb-rank { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--bg-elevated); font-family: 'JetBrains Mono', monospace; font-size:14px; font-weight: 800; color: var(--text-muted); flex-shrink: 0; }
  .lb-rank.gold { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: #000; box-shadow: 0 0 12px rgba(255,215,0,0.5); }
  .lb-rank.silver { background: linear-gradient(135deg, #E0E0E0 0%, #A0A0A0 100%); color: #000; }
  .lb-rank.bronze { background: linear-gradient(135deg, #CD7F32 0%, #8B4513 100%); color: #fff; }

  .lb-info { flex: 1; min-width: 0; }
  .lb-info-main { font-family: 'JetBrains Mono', monospace; font-size:14px; font-weight: 800; color: var(--text-primary); word-break: break-all; }
  .lb-info-sub { font-family: 'JetBrains Mono', monospace; font-size:11px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.04em; }

  .lb-val { text-align: right; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
  .lb-val-primary { font-size: 14px; font-weight: 800; color: var(--gold-bright); }
  .lb-val-secondary { font-size:11px; color: var(--text-muted); margin-top: 2px; }

  .lb-img { width: 36px; height: 36px; border-radius: 10px; object-fit: cover; background: var(--bg-elevated); border: 1px solid var(--border); flex-shrink: 0; }

  .empty-state { padding: 30px 14px; text-align: center; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size:13px; }
  .err { color: var(--red); }

/* V4.9 — Visible placeholders (added 2026-05-27) */
input::placeholder, textarea::placeholder,
input::-webkit-input-placeholder, textarea::-webkit-input-placeholder,
input::-moz-placeholder, textarea::-moz-placeholder {
  color: #eee !important;
  opacity: 1 !important;
}

<body>
<div class="v3-app">
  <div class="v3-topbar">
    <button class="v3-back" onclick="history.back()">‹</button>
    <div class="v3-title">🏆 Leaderboard</div>
  </div>

  <div class="v3-content">
    <div class="lb-tabs">
      <button class="lb-tab active" data-tab="burners" onclick="setTab('burners')">🔥 BURNERS</button>
      <button class="lb-tab" data-tab="coins" onclick="setTab('coins')">💎 COINS</button>
      <button class="lb-tab" data-tab="traders" onclick="setTab('traders')">📈 TRADERS</button>
    </div>

    <div class="lb-period" id="periodBar">
      <button class="lb-period-btn active" data-p="24h" onclick="setPeriod('24h')">24H</button>
      <button class="lb-period-btn" data-p="7d" onclick="setPeriod('7d')">7D</button>
      <button class="lb-period-btn" data-p="all" onclick="setPeriod('all')">ALL TIME</button>
    </div>

    <div class="lb-list" id="lbList">
      <div class="empty-state" data-t="loadingMsg">Loading...</div>
    </div>
  </div>

  
</div>

<script>
const API = 'https://goldbrix.app';
const LBT=(function(){var L='en';try{L=(localStorage.getItem('gbx_lang')||localStorage.getItem('goldbrix_lang')||'en').slice(0,2);}catch(e){}
if(L==='ar'){try{document.documentElement.dir='rtl';}catch(e){}}
var T={
 en:{title:'\ud83c\udfc6 Leaderboard',burners:'\ud83d\udd25 BURNERS',coins:'\ud83d\udc8e COINS',traders:'\ud83d\udcc8 TRADERS',all:'ALL TIME',nodata:'No data yet',loading:'Loading...'},
 ro:{title:'\ud83c\udfc6 Clasament',burners:'\ud83d\udd25 ARZ\u0102TORI',coins:'\ud83d\udc8e MONEDE',traders:'\ud83d\udcc8 TRADERI',all:'TOT TIMPUL',nodata:'Nicio dat\u0103 \u00eenc\u0103',loading:'Se \u00eencarc\u0103...'},
 de:{title:'\ud83c\udfc6 Bestenliste',burners:'\ud83d\udd25 BURNER',coins:'\ud83d\udc8e COINS',traders:'\ud83d\udcc8 TRADER',all:'GESAMT',nodata:'Noch keine Daten',loading:'L\u00e4dt...'},
 zh:{title:'\ud83c\udfc6 \u6392\u884c\u699c',burners:'\ud83d\udd25 \u9500\u6bc1\u699c',coins:'\ud83d\udc8e \u5e01\u79cd\u699c',traders:'\ud83d\udcc8 \u4ea4\u6613\u699c',all:'\u5168\u90e8',nodata:'\u6682\u65e0\u6570\u636e',loading:'\u52a0\u8f7d\u4e2d...'},
 ar:{title:'\ud83c\udfc6 \u0644\u0648\u062d\u0629 \u0627\u0644\u0635\u062f\u0627\u0631\u0629',burners:'\ud83d\udd25 \u0627\u0644\u062d\u0627\u0631\u0642\u0648\u0646',coins:'\ud83d\udc8e \u0627\u0644\u0639\u0645\u0644\u0627\u062a',traders:'\ud83d\udcc8 \u0627\u0644\u0645\u062a\u062f\u0627\u0648\u0644\u0648\u0646',all:'\u0643\u0644 \u0627\u0644\u0648\u0642\u062a',nodata:'\u0644\u0627 \u0628\u064a\u0627\u0646\u0627\u062a \u0628\u0639\u062f',loading:'\u062c\u0627\u0631\u064d \u0627\u0644\u062a\u062d\u0645\u064a\u0644...'}
};return T[L]||T.en;})();
(function(){function q(sel){return document.querySelector(sel);}
 var m=[['.v3-title','title'],['[data-tab="burners"]','burners'],['[data-tab="coins"]','coins'],['[data-tab="traders"]','traders'],['[data-p="all"]','all']];
 m.forEach(function(p){var el=q(p[0]); if(el) el.textContent=LBT[p[1]];});
 var ld=q('[data-t="loadingMsg"]'); if(ld) ld.textContent=LBT.loading;})();
let currentTab = 'burners';
let currentPeriod = '24h';
let firstLoad = true;

function fmt(n, d) {
  if (typeof n !== 'number' || isNaN(n)) return '0';
  if (d === undefined) d = 2;
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(2) + 'K';
  return n.toFixed(d);
}

function rankClass(r) {
  if (r === 1) return 'gold';
  if (r === 2) return 'silver';
  if (r === 3) return 'bronze';
  return '';
}

function rankIcon(r) {
  if (r === 1) return '🥇';
  if (r === 2) return '🥈';
  if (r === 3) return '🥉';
  return '#' + r;
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.lb-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  // Coins tab doesn't use period — hide period bar
  document.getElementById('periodBar').style.display = (tab === 'coins') ? 'none' : 'flex';
  firstLoad = true;
  load();
}

function setPeriod(p) {
  currentPeriod = p;
  document.querySelectorAll('.lb-period-btn').forEach(b => b.classList.toggle('active', b.dataset.p === p));
  firstLoad = true;
  load();
}

async function load() {
  const list = document.getElementById('lbList');
  if (firstLoad) list.innerHTML = '<div class="empty-state">'+LBT.loading+'</div>';

  try {
    let url;
    if (currentTab === 'burners') {
      url = API + '/v2/memecoin/leaderboard/burners?period=' + currentPeriod + '&limit=50';
    } else if (currentTab === 'coins') {
      url = API + '/v2/memecoin/leaderboard/coins?metric=market_cap&limit=50';
    } else {
      url = API + '/v2/memecoin/leaderboard/trades?period=' + currentPeriod + '&limit=50';
    }

    const r = await fetch(url);
    const d = await r.json();

    let items = d.burners || d.coins || d.traders || d.trades || [];

    if (!d.ok || items.length === 0) {
      list.innerHTML = '<div class="empty-state">'+LBT.nodata+'</div>';
      firstLoad = false;
      return;
    }

    // Build new HTML
    const newHtml = items.slice(0, 50).map((item, i) => renderRow(item, i + 1)).join('');

    // Only update if changed (silent refresh)
    if (list.innerHTML !== newHtml) {
      list.innerHTML = newHtml;
    }

    firstLoad = false;
  } catch(e) {
    if (firstLoad) list.innerHTML = '<div class="empty-state err">Load failed: ' + e.message + '</div>';
  }
}

function renderRow(item, rank) {
  const cls = rankClass(rank);
  const rowCls = rank <= 3 ? 'rank-' + rank : '';

  if (currentTab === 'burners') {
    return '<div class="lb-row ' + rowCls + '" onclick="goAddress(\'' + item.address + '\')">' +
      '<div class="lb-rank ' + cls + '">' + rankIcon(rank) + '</div>' +
      '<div class="lb-info">' +
      '<div class="lb-info-main">' + (item.address_short || item.address.slice(0,12)+'...'+item.address.slice(-6)) + '</div>' +
      '<div class="lb-info-sub">' + (item.trade_count || 0) + ' txs · vol ' + fmt(item.total_volume_gbx || 0, 2) + ' GBX</div>' +
      '</div>' +
      '<div class="lb-val">' +
      '<div class="lb-val-primary">' + fmt(item.total_burned_gbx || 0, 4) + ' 🔥</div>' +
      '<div class="lb-val-secondary">GBX BURNED</div>' +
      '</div>' +
      '</div>';
  } else if (currentTab === 'coins') {
    const img = item.image_url ? ('<img class="lb-img" src="' + item.image_url + '" alt="">') : '<div class="lb-img" style="display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:800;">' + (item.ticker||'?').charAt(0) + '</div>';
    return '<div class="lb-row ' + rowCls + '" onclick="goCoin(\'' + (item.ticker||'') + '\')">' +
      '<div class="lb-rank ' + cls + '">' + rankIcon(rank) + '</div>' +
      img +
      '<div class="lb-info">' +
      '<div class="lb-info-main">$' + (item.ticker || '?') + '</div>' +
      '<div class="lb-info-sub">' + (item.name || '') + '</div>' +
      '</div>' +
      '<div class="lb-val">' +
      '<div class="lb-val-primary">' + fmt(item.market_cap_gbx || 0, 2) + ' GBX</div>' +
      '<div class="lb-val-secondary">MARKET CAP</div>' +
      '</div>' +
      '</div>';
  } else {
    return '<div class="lb-row ' + rowCls + '" onclick="goAddress(\'' + item.address + '\')">' +
      '<div class="lb-rank ' + cls + '">' + rankIcon(rank) + '</div>' +
      '<div class="lb-info">' +
      '<div class="lb-info-main">' + (item.address_short || item.address.slice(0,12)+'...'+item.address.slice(-6)) + '</div>' +
      '<div class="lb-info-sub">' + (item.trade_count || item.tx_count || 0) + ' trades</div>' +
      '</div>' +
      '<div class="lb-val">' +
      '<div class="lb-val-primary">' + fmt(item.total_volume_gbx || item.volume_gbx || 0, 2) + '</div>' +
      '<div class="lb-val-secondary">VOLUME GBX</div>' +
      '</div>' +
      '</div>';
  }
}

function goAddress(addr) {
  if (!addr) return;
  var _u='/v3/wallet-view.html?addr='+addr; if(!(window.__spaNavTo&&window.__spaNavTo(_u))) window.location.href=_u;
}
async function goCoin(ticker) {
  if (!ticker) return;
  try {
    const r = await fetch('https://goldbrix.app/v2/memecoin/list?limit=2000');
    const d = await r.json();
    const coins = d.coins || d || [];
    const match = coins.find(c => (c.ticker||'').toUpperCase() === ticker.toUpperCase());
    if (match && match.id) {
      window.location.href = '/v3/trade.html?coin=' + match.id;
      return;
    }
  } catch(e){}
  // Fallback: pass ticker directly (backend may handle it)
  window.location.href = '/v3/trade.html?coin=' + ticker;
}

window.setTab = setTab;
window.setPeriod = setPeriod;
window.goAddress = goAddress;
window.goCoin = goCoin;

// Initial + silent polling
load();
setInterval(load, 30000);
</script>
